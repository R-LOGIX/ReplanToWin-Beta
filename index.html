<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplanToWin - Chunk Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.95);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #e2e8f0;
            --danger: #ff4757;
            --success: #2ed573;
            --chunk-accent: #ff9f43;
            --premium-gold: #ffd700;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--accent-glow);
            padding: 12px 4px;
            position: sticky;
            top: 0;
            z-index: 1000;
        }
        nav div {
            cursor: pointer;
            font-size: 0.75rem;
            color: #64748b;
            font-family: 'Orbitron';
            font-weight: bold;
            padding: 6px 10px;
            border-radius: 6px;
            transition: 0.2s;
        }
        nav div.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            background: rgba(0, 242, 255, 0.08);
        }

        /* Views */
        .view { max-width: 800px; margin: 20px auto; padding: 0 20px; display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }

        h3 { font-size: 1rem; color: var(--accent); margin-top: 0; border-left: 3px solid var(--accent); padding-left: 10px; }
        
        /* Buttons & Inputs */
        button {
            background: linear-gradient(135deg, var(--accent), #0099ff);
            color: #000; border: none; padding: 14px; border-radius: 8px;
            font-weight: bold; cursor: pointer; width: 100%; font-size: 1rem;
            margin-bottom: 10px; transition: 0.2s; font-family: 'Noto Sans JP';
        }
        button:active { transform: scale(0.98); }
        button.secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        button.danger { background: rgba(255, 71, 87, 0.1); border: 1px solid var(--danger); color: var(--danger); width: auto; font-size: 0.8rem; padding: 6px 12px; }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px;
        }

        /* Specialized UI for Chunk Mode */
        .chunk-highlight {
            border: 1px solid var(--chunk-accent);
            background: rgba(255, 159, 67, 0.05);
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .benefit-tag {
            background: var(--chunk-accent);
            color: #000;
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 8px;
            display: inline-block;
        }

        .status-tag {
            font-size: 0.65rem; padding: 2px 8px; border-radius: 4px; font-weight: bold;
        }
        .tag-chunk { background: #7c3aed; color: #fff; }
        .tag-final { background: var(--chunk-accent); color: #000; }

        .task-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); z-index: 2000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div style="font-size: 3rem; animation: pulse 1s infinite;">⚡</div>
        <div style="font-family: 'Orbitron'; color: var(--accent); letter-spacing: 3px; margin-top: 15px;">CALCULATING...</div>
    </div>

    <nav>
        <div onclick="switchView('home')" id="nav-home" class="active">HOME</div>
        <div onclick="switchView('settings')" id="nav-settings">1. 登録</div>
        <div onclick="switchView('progress')" id="nav-progress">2. 記録</div>
        <div onclick="switchView('plan')" id="nav-plan">3. 計画</div>
    </nav>

    <div id="view-home" class="view active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div class="glass-card" style="text-align: center;">
                <small style="opacity:0.6;">全体進捗</small>
                <div id="stat-progress" style="font-family: 'Orbitron'; font-size: 1.8rem; color: var(--accent);">0%</div>
            </div>
            <div class="glass-card" style="text-align: center;">
                <small style="opacity:0.6;">試験まで</small>
                <div id="stat-days" style="font-family: 'Orbitron'; font-size: 1.8rem; color: #bc00ff;">--</div>
            </div>
        </div>
        <div class="glass-card">
            <h3>本日のミッション</h3>
            <div id="today-list"></div>
        </div>
        <button id="main-plan-btn" onclick="generatePlan()" class="secondary">✨ AI学習計画を最適化する</button>
    </div>

    <div id="view-settings" class="view">
        <div class="glass-card">
            <h3>教材の登録</h3>
            <input id="in-sub" placeholder="科目・教材名 (例: 英単語ターゲット1900)">
            
            <label style="font-size: 0.8rem; color: var(--accent);">完了目標日（試験日など）：</label>
            <input id="in-date" type="date">

            <label style="font-size: 0.8rem; color: var(--accent);">学習する曜日：</label>
            <div style="display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 15px;">
                <label><input type="checkbox" class="in-day" value="1" checked>月</label>
                <label><input type="checkbox" class="in-day" value="2" checked>火</label>
                <label><input type="checkbox" class="in-day" value="3" checked>水</label>
                <label><input type="checkbox" class="in-day" value="4" checked>木</label>
                <label><input type="checkbox" class="in-day" value="5" checked>金</label>
                <label><input type="checkbox" class="in-day" value="6" checked>土</label>
                <label><input type="checkbox" class="in-day" value="0" checked>日</label>
            </div>

            <label style="font-size: 0.8rem; color: var(--accent);">全ボリューム（数値で入力）：</label>
            <div style="display: flex; gap: 10px;">
                <input id="in-vol" type="number" placeholder="例: 1500" style="flex: 2;">
                <input id="in-unit" placeholder="単位(語/P)" value="P" style="flex: 1;">
            </div>

            <div class="chunk-highlight">
                <div class="benefit-tag">記憶定着率UP</div>
                <label style="display: flex; align-items: center; gap: 10px; cursor: pointer; font-weight: bold; color: var(--chunk-accent);">
                    <input type="checkbox" id="in-chunk-mode" style="width: 20px; height: 20px; margin: 0;">
                    小刻み復習モードを有効にする
                </label>
                <p style="font-size: 0.75rem; color: #94a3b8; margin: 10px 0 0 30px; line-height: 1.4;">
                    1つの範囲を数日間連続で学習し、脳に深く刻み込みます。AIが目標日に間に合う最適な分割サイズを自動計算します。
                </p>
            </div>

            <div style="display: flex; align-items: center; gap: 15px; margin-bottom: 20px;">
                <span>目標周回数:</span>
                <input id="in-rounds" type="number" value="3" min="2" style="width: 80px; margin: 0;">
            </div>

            <button onclick="addMaterial()">この教材をリストに追加</button>
        </div>

        <div class="glass-card">
            <h3>登録済み教材</h3>
            <div id="registered-list"></div>
        </div>
    </div>

    <div id="view-progress" class="view">
        <div class="glass-card">
            <h3>進捗を記録する</h3>
            <p style="font-size: 0.8rem; opacity: 0.7;">完了したタスクにチェックを入れて保存してください。</p>
            <div id="progress-list"></div>
            <button onclick="saveProgress()" style="margin-top: 15px;">進捗を保存する</button>
        </div>
    </div>

    <div id="view-plan" class="view">
        <div class="glass-card">
            <h3>全日程の計画表</h3>
            <div id="full-plan-area"></div>
        </div>
    </div>

    <script>
        // --- 1. DATA STRUCTURE ---
        let state = {
            materials: [],
            plan: {}, // date -> tasks
            progress: {} // date_taskId -> boolean
        };

        const KEY = 'replan_win_v8_final';

        function load() {
            const saved = localStorage.getItem(KEY);
            if (saved) state = JSON.parse(saved);
            render();
        }

        function save() {
            localStorage.setItem(KEY, JSON.stringify(state));
            render();
        }

        // --- 2. LOGIC: SCHEDULING ---

        function addMaterial() {
            const sub = document.getElementById('in-sub').value;
            const date = document.getElementById('in-date').value;
            const vol = parseInt(document.getElementById('in-vol').value);
            const unit = document.getElementById('in-unit').value;
            const rounds = parseInt(document.getElementById('in-rounds').value);
            const chunkMode = document.getElementById('in-chunk-mode').checked;
            const days = Array.from(document.querySelectorAll('.in-day:checked')).map(el => parseInt(el.value));

            if (!sub || !date || isNaN(vol)) return alert('入力を確認してください');

            state.materials.push({
                id: Date.now(),
                sub, targetDate: date, vol, unit, rounds, chunkMode, activeDays: days
            });

            save();
            alert('登録しました。ホームから「計画を最適化」してください。');
            switchView('home');
        }

        function generatePlan() {
            const loading = document.getElementById('loading');
            loading.style.display = 'flex';

            setTimeout(() => {
                state.plan = {};
                const today = new Date();
                today.setHours(0,0,0,0);

                state.materials.forEach(m => {
                    const studyDates = getAvailableDates(today, new Date(m.targetDate), m.activeDays);
                    if (studyDates.length === 0) return;

                    if (m.chunkMode) {
                        // アルゴリズム: 小刻み復習
                        // 1チャンクにつき (Rounds-1)日の連続学習 + 最終1日の合計 Rounds日必要
                        // 全体で D日ある場合、最大で作れるチャンク数は D / Rounds
                        const maxChunks = Math.max(1, Math.floor(studyDates.length / m.rounds));
                        const chunkSize = Math.ceil(m.vol / maxChunks);
                        
                        let dateIdx = 0;
                        // フェーズ1: 連続学習
                        for (let c = 0; c < maxChunks; c++) {
                            const start = c * chunkSize + 1;
                            const end = Math.min((c + 1) * chunkSize, m.vol);
                            if (start > m.vol) break;

                            for (let r = 1; r < m.rounds; r++) {
                                if (dateIdx >= studyDates.length) break;
                                addTask(studyDates[dateIdx], {
                                    sub: m.sub,
                                    range: `${start}-${end}${m.unit}`,
                                    label: `${r}周目`,
                                    isFinal: false
                                });
                                dateIdx++;
                            }
                        }

                        // フェーズ2: 最終周 (1回ずつ)
                        for (let c = 0; c < maxChunks; c++) {
                            const start = c * chunkSize + 1;
                            const end = Math.min((c + 1) * chunkSize, m.vol);
                            if (start > m.vol) break;
                            if (dateIdx >= studyDates.length) break;

                            addTask(studyDates[dateIdx], {
                                sub: m.sub,
                                range: `${start}-${end}${m.unit}`,
                                label: `最終確認`,
                                isFinal: true
                            });
                            dateIdx++;
                        }

                    } else {
                        // 通常モード: 単純分散
                        const totalTasks = m.vol * m.rounds;
                        const perDay = Math.ceil(totalTasks / studyDates.length);
                        let currentTotal = 0;

                        studyDates.forEach(d => {
                            const start = (currentTotal % m.vol) + 1;
                            let end = start + perDay - 1;
                            const roundNum = Math.floor(currentTotal / m.vol) + 1;
                            
                            addTask(d, {
                                sub: m.sub,
                                range: `${start}-${Math.min(end, m.vol)}${m.unit}`,
                                label: `${roundNum}周目`,
                                isFinal: roundNum === m.rounds
                            });
                            currentTotal += perDay;
                        });
                    }
                });

                loading.style.display = 'none';
                save();
            }, 800);
        }

        function getAvailableDates(start, end, activeDays) {
            const dates = [];
            let curr = new Date(start);
            while (curr <= end) {
                if (activeDays.includes(curr.getDay())) {
                    dates.push(new Date(curr).toISOString().split('T')[0]);
                }
                curr.setDate(curr.getDate() + 1);
            }
            return dates;
        }

        function addTask(dateStr, task) {
            if (!state.plan[dateStr]) state.plan[dateStr] = [];
            task.id = Math.random().toString(36).substr(2, 9);
            state.plan[dateStr].push(task);
        }

        // --- 3. UI RENDERING ---

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav div').forEach(n => n.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.getElementById('nav-' + id).classList.add('active');
        }

        function render() {
            renderHome();
            renderSettings();
            renderProgress();
            renderPlan();
        }

        function renderHome() {
            const today = new Date().toISOString().split('T')[0];
            const list = document.getElementById('today-list');
            const tasks = state.plan[today] || [];

            list.innerHTML = tasks.length ? '' : '<p style="opacity:0.5; text-align:center;">本日のタスクはありません</p>';
            tasks.forEach(t => {
                const isDone = state.progress[`${today}_${t.id}`];
                list.innerHTML += `
                    <div class="task-item" style="opacity: ${isDone ? 0.5 : 1}">
                        <div>
                            <div style="font-weight:bold;">${t.sub}</div>
                            <small>${t.range} <span class="status-tag ${t.isFinal ? 'tag-final' : 'tag-chunk'}">${t.label}</span></small>
                        </div>
                        <div style="color: var(--accent); font-size: 1.2rem;">${isDone ? '✅' : '⚡'}</div>
                    </div>
                `;
            });

            // Stats
            const totalTasks = Object.values(state.plan).flat().length;
            const doneTasks = Object.values(state.progress).filter(v => v).length;
            document.getElementById('stat-progress').innerText = totalTasks ? Math.round((doneTasks/totalTasks)*100) + '%' : '0%';
        }

        function renderSettings() {
            const list = document.getElementById('registered-list');
            list.innerHTML = '';
            state.materials.forEach((m, idx) => {
                list.innerHTML += `
                    <div style="border-bottom: 1px solid #333; padding: 10px 0;">
                        <div style="display:flex; justify-content:space-between;">
                            <strong>${m.sub}</strong>
                            <button class="danger" onclick="deleteMaterial(${idx})">削除</button>
                        </div>
                        <small>${m.vol}${m.unit} / ${m.rounds}周 / ${m.chunkMode ? '小刻みモード' : '通常'}</small>
                    </div>
                `;
            });
        }

        function renderProgress() {
            const today = new Date().toISOString().split('T')[0];
            const area = document.getElementById('progress-list');
            const tasks = state.plan[today] || [];

            area.innerHTML = tasks.length ? '' : '<p>本日のタスクはありません</p>';
            tasks.forEach(t => {
                const checked = state.progress[`${today}_${t.id}`] ? 'checked' : '';
                area.innerHTML += `
                    <label style="display:flex; align-items:center; gap:15px; background:rgba(255,255,255,0.05); padding:15px; border-radius:8px; margin-bottom:10px; cursor:pointer;">
                        <input type="checkbox" style="width:22px; height:22px;" onchange="toggleTask('${today}', '${t.id}', this.checked)" ${checked}>
                        <div>
                            <div>${t.sub}</div>
                            <small>${t.range} (${t.label})</small>
                        </div>
                    </label>
                `;
            });
        }

        function renderPlan() {
            const area = document.getElementById('full-plan-area');
            area.innerHTML = '';
            const dates = Object.keys(state.plan).sort();

            if (dates.length === 0) {
                area.innerHTML = '<p style="text-align:center; opacity:0.5;">計画が生成されていません</p>';
                return;
            }

            dates.forEach(d => {
                let html = `<div style="margin-bottom:15px;"><h4 style="color:var(--accent); border-bottom:1px solid #333;">${d}</h4>`;
                state.plan[d].forEach(t => {
                    html += `<div style="font-size:0.85rem; padding:4px 0;">・${t.sub} : ${t.range} (${t.label})</div>`;
                });
                html += `</div>`;
                area.innerHTML += html;
            });
        }

        function toggleTask(date, taskId, isChecked) {
            state.progress[`${date}_${taskId}`] = isChecked;
        }

        function saveProgress() {
            save();
            alert('進捗を保存しました！');
            switchView('home');
        }

        function deleteMaterial(idx) {
            if (confirm('この教材を削除しますか？')) {
                state.materials.splice(idx, 1);
                save();
            }
        }

        window.onload = load;
    </script>
</body>
</html>
