<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplanToWin</title>
    <link rel="icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" type="image/png">
    <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.95);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #e2e8f0;
            --danger: #ff4757;
            --success: #2ed573;
            --chunk-accent: #ff9f43;
        }

        * {
            box-sizing: border-box;
        }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 40px;
        }

        nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--accent-glow);
            padding: 12px 4px;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 4px;
        }
        nav div {
            cursor: pointer;
            font-size: 0.68rem;
            color: #64748b;
            font-family: 'Orbitron';
            font-weight: bold;
            letter-spacing: 1px;
            padding: 6px 10px;
            border-radius: 6px;
            transition: all 0.2s;
            white-space: nowrap;
        }
        nav div.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
            background: rgba(0, 242, 255, 0.08);
        }
        nav div:hover {
            color: #b0c4de;
        }

        .view {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            display: none;
        }
        .view.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .glass-card {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }

        h3 {
            font-size: 1rem;
            color: var(--accent);
            margin-top: 0;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }
        h4 {
            font-size: 0.9rem;
            color: var(--accent);
            margin: 0 0 8px 0;
            border-bottom: 1px solid #333;
            padding-bottom: 4px;
        }

        button {
            background: linear-gradient(135deg, var(--accent), #0099ff);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-bottom: 10px;
            transition: all 0.2s;
            font-family: 'Noto Sans JP', sans-serif;
        }
        button:active {
            transform: scale(0.98);
        }
        button.secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        button.danger {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 12px;
            width: auto;
            font-size: 0.8rem;
            margin-bottom: 4px;
        }

        input,
        select,
        textarea {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 12px;
            font-size: 1rem;
            font-family: 'Noto Sans JP', sans-serif;
        }
        input:focus,
        select:focus,
        textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 8px var(--accent-glow);
        }

        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            gap: 10px;
            flex-wrap: wrap;
        }
        .status-tag {
            font-size: 0.65rem;
            background: var(--accent);
            color: #000;
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            white-space: nowrap;
        }
        .status-tag.final {
            background: var(--chunk-accent);
            color: #000;
        }
        .status-tag.chunk {
            background: #7c3aed;
            color: #fff;
        }

        .checkbox-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #a0aec0;
            user-select: none;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div style="font-size: 3rem; animation: pulse 1s infinite;">⚡</div>
        <div style="font-family: 'Orbitron'; color: var(--accent); letter-spacing: 3px; margin-top: 15px;">AI GENERATING...</div>
    </div>

    <nav>
        <div onclick="switchView('home')" id="nav-home" class="active">ホーム</div>
        <div onclick="switchView('settings')" id="nav-settings">1. 教材登録</div>
        <div onclick="switchView('progress')" id="nav-progress">2. 進捗入力</div>
        <div onclick="switchView('plan')" id="nav-plan">3. 計画表</div>
    </nav>

    <div id="view-home" class="view active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div class="glass-card" style="text-align: center;">
                <small style="opacity:0.6;">現在のステータス</small>
                <div id="stat-progress" style="font-family: 'Orbitron'; font-size: 1.5rem; color: var(--accent);">READY</div>
            </div>
            <div class="glass-card" style="text-align: center;">
                <small style="opacity:0.6;">最短の試験まで</small>
                <div id="stat-days" style="font-family: 'Orbitron'; font-size: 2rem; color: #bc00ff;">--</div>
            </div>
        </div>
        <div class="glass-card">
            <h3>本日の学習タスク</h3>
            <div id="today-list"></div>
        </div>
        <button onclick="switchView('progress')">今日の進捗を記録する</button>
        <div class="glass-card" style="margin-bottom: 15px;">
            <h3 style="font-size: 0.9rem; margin-bottom: 10px;">AI スケジューリング設定</h3>
            <div class="item-row" style="padding: 5px 0; border: none;">
                <span style="font-size: 0.9rem;">計画再開/開始日</span>
                <input type="date" id="sys-start-date" style="width: auto; margin: 0; padding: 8px;">
            </div>
        </div>
        <button id="main-plan-btn" onclick="generatePlan()" class="secondary">✨ AI計画を再構成する</button>
    </div>

    <div id="view-settings" class="view">
        <div class="glass-card">
            <h3>新しい教材を追加する</h3>
            <input id="in-sub" placeholder="科目 (例: 数学)">
            <input id="in-date" type="date">
            
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.8rem; color: var(--accent);">学習する曜日：</label>
                <div class="checkbox-group" id="in-days">
                    <label><input type="checkbox" value="1" checked>月</label>
                    <label><input type="checkbox" value="2" checked>火</label>
                    <label><input type="checkbox" value="3" checked>水</label>
                    <label><input type="checkbox" value="4" checked>木</label>
                    <label><input type="checkbox" value="5" checked>金</label>
                    <label><input type="checkbox" value="6" checked>土</label>
                    <label><input type="checkbox" value="0" checked>日</label>
                </div>
            </div>

            <select id="in-mode" onchange="toggleMode()">
                <option value="range">ページ範囲 (1-200)</option>
                <option value="vol">合計件数 (1500語)</option>
                <option value="list">項目リスト (カンマ区切り)</option>
            </select>
            <div id="ui-range">
                <input id="in-name-range" placeholder="教材名">
                <input id="in-val-range" placeholder="範囲 (例: 1-150)">
                <input id="in-unit-range" value="P" placeholder="単位">
            </div>
            <div id="ui-vol" style="display:none;">
                <input id="in-name-vol" placeholder="教材名">
                <input id="in-val-vol" type="number" placeholder="合計件数">
                <input id="in-unit-vol" value="語" placeholder="単位">
            </div>
            <div id="ui-list" style="display:none;">
                <input id="in-name-list" placeholder="教材名">
                <textarea id="in-val-list" placeholder="項目A, 項目B, 項目C..." rows="3"></textarea>
            </div>

            <div id="chunk-mode-area" style="margin: 10px 0; padding: 12px; border: 2px solid var(--chunk-accent); border-radius: 8px;">
                <label style="display: flex; align-items: center; gap: 8px; font-weight: bold; color: var(--chunk-accent);">
                    <input type="checkbox" id="in-chunk-mode" checked> 🔄 小刻み復習モード
                </label>
            </div>

            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <span>目標周回数:</span>
                <input id="in-rounds" type="number" value="3" min="1" style="width: 80px; margin: 0;">
            </div>
            <button onclick="addMaterial()">教材を登録する</button>
        </div>
        <div class="glass-card">
            <h3>登録済みの教材</h3>
            <div id="registered-list"></div>
        </div>
    </div>

    <div id="view-progress" class="view">
        <div class="glass-card">
            <h3>学習進捗の報告</h3>
            <p style="font-size: 0.8rem; opacity: 0.7; margin-bottom: 20px;">
                現在どこまで完了しているか入力してください。ここでの数値に基づき、未完了分をAIが再配置します。
            </p>
            <div id="progress-input-area"></div>
            <button onclick="saveAndReplan()" style="margin-top: 10px;">進捗を保存して計画を更新</button>
        </div>
    </div>

    <div id="view-plan" class="view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h3 style="margin: 0;">全日程の計画表</h3>
        </div>
        <div id="full-plan-area"></div>
    </div>

    <script>
        let state = { exams: [], plan: {}, startDate: new Date().toISOString().split('T')[0] };
        const KEY = 'replan_v8_data';

        function load() {
            const saved = localStorage.getItem(KEY);
            if (saved) state = JSON.parse(saved);
            document.getElementById('sys-start-date').value = state.startDate || new Date().toISOString().split('T')[0];
            render();
        }

        function save() {
            state.startDate = document.getElementById('sys-start-date').value;
            localStorage.setItem(KEY, JSON.stringify(state));
            render();
        }

        function toggleMode() {
            const m = document.getElementById('in-mode').value;
            ['ui-range', 'ui-vol', 'ui-list'].forEach(id => document.getElementById(id).style.display = (id === 'ui-' + m) ? 'block' : 'none');
        }

        function addMaterial() {
            const sub = document.getElementById('in-sub').value;
            const date = document.getElementById('in-date').value;
            if (!sub || !date) return alert('入力が不足しています');

            const mode = document.getElementById('in-mode').value;
            let mName, mVal, mUnit, mType;

            if (mode === 'range') {
                mName = document.getElementById('in-name-range').value;
                mVal = document.getElementById('in-val-range').value;
                mUnit = document.getElementById('in-unit-range').value;
                mType = 'range';
            } else if (mode === 'vol') {
                mName = document.getElementById('in-name-vol').value;
                mVal = document.getElementById('in-val-vol').value;
                mUnit = document.getElementById('in-unit-vol').value;
                mType = 'vol';
            } else {
                mName = document.getElementById('in-name-list').value;
                mVal = document.getElementById('in-val-list').value;
                mUnit = '項目';
                mType = 'list';
            }

            state.exams.push({
                id: Date.now(),
                sub, date, name: mName || sub,
                type: mType, val: mVal, unit: mUnit,
                rounds: parseInt(document.getElementById('in-rounds').value) || 1,
                studyDays: Array.from(document.querySelectorAll('#in-days input:checked')).map(el => parseInt(el.value)),
                chunkMode: document.getElementById('in-chunk-mode').checked,
                progress: 0 // 初期進捗は0
            });
            save();
        }

        function deleteMaterial(id) {
            state.exams = state.exams.filter(e => e.id !== id);
            save();
        }

        function saveAndReplan() {
            state.exams.forEach(ex => {
                const input = document.getElementById(`prog-${ex.id}`);
                if (input) ex.progress = parseInt(input.value) || 0;
            });
            generatePlan();
        }

        function generatePlan() {
            const start = new Date(document.getElementById('sys-start-date').value);
            document.getElementById('loading').style.display = 'flex';

            setTimeout(() => {
                const plan = {};
                state.exams.forEach(ex => {
                    const allItems = parseItems(ex);
                    // 進捗(progress)分を除外した残りアイテムを抽出
                    const items = allItems.slice(ex.progress);
                    if (items.length === 0) return;

                    const availableDates = getDates(start, new Date(ex.date), ex.studyDays);
                    if (availableDates.length === 0) return;

                    if (ex.chunkMode) {
                        const R = ex.rounds;
                        const maxChunks = Math.max(1, Math.floor(availableDates.length / R));
                        const chunkSize = Math.ceil(items.length / maxChunks);
                        const chunks = [];
                        for (let i = 0; i < items.length; i += chunkSize) chunks.push(items.slice(i, i + chunkSize));

                        let q = [];
                        if (R > 1) chunks.forEach(c => { for (let r = 1; r < R; r++) q.push({ sub: ex.sub, range: fmt(c, ex.type), round: r, isFinal: false, isChunk: true }); });
                        chunks.forEach(c => q.push({ sub: ex.sub, range: fmt(c, ex.type), round: R, isFinal: true, isChunk: true }));

                        q.forEach((t, i) => { if (availableDates[i]) { (plan[availableDates[i]] = plan[availableDates[i]] || []).push(t); } });
                    } else {
                        const total = items.length * ex.rounds;
                        const pace = total / availableDates.length;
                        let curr = 0;
                        availableDates.forEach((d, i) => {
                            const count = Math.floor((i + 1) * pace) - Math.floor(i * pace);
                            if (count > 0) {
                                let range;
                                if (ex.type === 'list') range = items.slice(curr % items.length, (curr % items.length) + count).join(', ');
                                else range = `${items[curr % items.length]}〜${items[(curr + count - 1) % items.length]}`;
                                (plan[d] = plan[d] || []).push({ sub: ex.sub, range, round: Math.floor(curr / items.length) + 1, isFinal: false, isChunk: false });
                                curr += count;
                            }
                        });
                    }
                });
                state.plan = plan;
                document.getElementById('loading').style.display = 'none';
                save();
                switchView('plan');
            }, 500);
        }

        function parseItems(ex) {
            let res = [];
            if (ex.type === 'range') {
                const p = ex.val.split('-').map(Number);
                for (let i = p[0]; i <= p[1]; i++) res.push(i + ex.unit);
            } else if (ex.type === 'vol') {
                for (let i = 1; i <= parseInt(ex.val); i++) res.push(i + ex.unit);
            } else {
                res = ex.val.split(',').map(s => s.trim());
            }
            return res;
        }

        function getDates(s, e, days) {
            let res = [], curr = new Date(s);
            while (curr < e) { // 試験当日は含めない
                if (days.includes(curr.getDay())) res.push(curr.toISOString().split('T')[0]);
                curr.setDate(curr.getDate() + 1);
            }
            return res;
        }

        function fmt(c, type) { return type === 'list' ? c.join(', ') : `${c[0]}〜${c[c.length-1]}`; }

        function switchView(id) {
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + id).classList.add('active');
            document.querySelectorAll('nav div').forEach(n => n.classList.remove('active'));
            document.getElementById('nav-' + id).classList.add('active');
            render();
        }

        function render() {
            const today = new Date().toISOString().split('T')[0];
            const daysLeft = state.exams.length ? Math.ceil((new Date(Math.min(...state.exams.map(e => new Date(e.date)))) - new Date()) / 86400000) : '--';
            document.getElementById('stat-days').innerText = daysLeft > 0 ? daysLeft + 'd' : (daysLeft === 0 ? 'DAY' : '--');

            const tList = document.getElementById('today-list');
            tList.innerHTML = '';
            (state.plan[today] || []).forEach(t => {
                tList.innerHTML += `<div class="item-row"><div><span class="status-tag ${t.isFinal?'final':''}">${t.round}周目</span> <strong>${t.sub}</strong><br><small>${t.range}</small></div></div>`;
            });

            const rList = document.getElementById('registered-list');
            rList.innerHTML = '';
            state.exams.forEach(ex => {
                rList.innerHTML += `<div class="item-row"><div><strong>${ex.sub}</strong><br><small>${ex.name} (現在:${ex.progress}${ex.unit})</small></div><button class="danger" onclick="deleteMaterial(${ex.id})">削除</button></div>`;
            });

            // 進捗入力エリアの生成
            const pArea = document.getElementById('progress-input-area');
            pArea.innerHTML = '';
            state.exams.forEach(ex => {
                const all = parseItems(ex);
                pArea.innerHTML += `
                    <div style="margin-bottom:15px;">
                        <label style="font-size:0.9rem; display:block; margin-bottom:5px;">${ex.sub} (${ex.name})</label>
                        <div style="display:flex; align-items:center; gap:10px;">
                            <input type="number" id="prog-${ex.id}" value="${ex.progress}" style="width:80px; margin:0;">
                            <span> / ${all.length} ${ex.unit} まで完了</span>
                        </div>
                    </div>`;
            });

            const pPlan = document.getElementById('full-plan-area');
            pPlan.innerHTML = '';
            Object.keys(state.plan).sort().forEach(d => {
                let html = `<div class="glass-card"><h4>${d}</h4>`;
                state.plan[d].forEach(t => {
                    html += `<div style="font-size:0.85rem; margin-bottom:4px; display:flex; justify-content:space-between; gap:10px;">
                        <span style="flex-shrink:0;"><span class="status-tag ${t.isFinal?'final':''}">${t.round}周</span> ${t.sub}</span>
                        <span style="opacity:0.8; text-align:right; word-break:break-all;">${t.range}</span></div>`;
                });
                pPlan.innerHTML += html + `</div>`;
            });
        }

        load();
    </script>
</body>
</html>
