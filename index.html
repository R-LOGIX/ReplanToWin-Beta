<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplanToWin</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚡</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.95);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #e2e8f0;
            --danger: #ff4757;
            --success: #2ed573;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            color: var(--text);
            font-family: 'Noto Sans JP', sans-serif;
            margin: 0;
            min-height: 100vh;
            padding-bottom: 30px;
        }
        nav {
            display: flex;
            justify-content: space-around;
            background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--accent-glow);
            padding: 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            flex-wrap: wrap;
            gap: 8px;
        }
        nav div {
            cursor: pointer;
            font-size: 0.7rem;
            color: #64748b;
            font-family: 'Orbitron';
            font-weight: bold;
            letter-spacing: 1px;
            padding: 4px 8px;
        }
        nav div.active {
            color: var(--accent);
            text-shadow: 0 0 10px var(--accent);
        }
        .view {
            max-width: 800px;
            margin: 20px auto;
            padding: 0 20px;
            display: none;
        }
        .view.active {
            display: block;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .glass-card {
            background: var(--panel);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
        }
        h3 {
            font-size: 1rem;
            color: var(--accent);
            margin-top: 0;
            border-left: 3px solid var(--accent);
            padding-left: 10px;
        }
        h4 {
            font-size: 0.9rem;
            color: var(--accent);
            border-bottom: 1px solid #333;
            margin-bottom: 10px;
            margin-top: 20px;
        }
        button {
            background: linear-gradient(135deg, var(--accent), #0099ff);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
            margin-bottom: 10px;
        }
        button:active { transform: scale(0.98); }
        button.secondary {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
        }
        button.danger {
            background: rgba(255, 71, 87, 0.1);
            border: 1px solid var(--danger);
            color: var(--danger);
            padding: 8px 12px;
            width: auto;
            font-size: 0.8rem;
        }
        button.success {
            background: rgba(46, 213, 115, 0.2);
            border: 1px solid var(--success);
            color: var(--success);
            padding: 8px 12px;
            width: auto;
            font-size: 0.8rem;
        }
        input,
        select,
        textarea {
            background: rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 12px;
            border-radius: 8px;
            width: 100%;
            margin-bottom: 12px;
            font-size: 1rem;
        }
        .plan-edit-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 0.9rem;
            margin: 4px 0;
        }
        .item-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            gap: 10px;
            flex-wrap: wrap;
        }
        .status-tag {
            font-size: 0.65rem;
            background: var(--accent);
            color: #000;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
            white-space: nowrap;
        }
        .checkbox-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 0.9rem;
            cursor: pointer;
            color: #a0aec0;
        }
        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: var(--accent);
        }
        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(2, 6, 23, 0.95);
            z-index: 2000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .chunk-badge {
            display: inline-block;
            background: rgba(0,242,255,0.2);
            color: var(--accent);
            font-size: 0.7rem;
            padding: 2px 6px;
            border-radius: 4px;
            margin-right: 4px;
        }
        .inline-input {
            width: 80px !important;
            display: inline-block;
            margin: 0 6px;
            padding: 8px;
            font-size: 0.9rem;
        }
        .small-text {
            font-size: 0.75rem;
            color: #a0aec0;
        }
    </style>
</head>
<body>

    <div id="loading">
        <div style="font-size: 3rem; animation: pulse 1s infinite;">⚡</div>
        <div style="font-family: 'Orbitron'; color: var(--accent); letter-spacing: 3px; margin-top: 15px;">AI GENERATING...</div>
    </div>

    <nav>
        <div onclick="switchView('home')" id="nav-home" class="active">ホーム</div>
        <div onclick="switchView('settings')" id="nav-settings">1. 教材登録</div>
        <div onclick="switchView('progress')" id="nav-progress">2. 進捗入力</div>
        <div onclick="switchView('plan')" id="nav-plan">3. 計画表</div>
    </nav>

    <div id="view-home" class="view active">
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
            <div class="glass-card" style="text-align: center;">
                <small style="opacity:0.6;">全体の進捗</small>
                <div id="stat-progress" style="font-family: 'Orbitron'; font-size: 2rem; color: var(--accent);">0%</div>
            </div>
            <div class="glass-card" style="text-align: center;">
                <small style="opacity:0.6;">最短の試験まで</small>
                <div id="stat-days" style="font-family: 'Orbitron'; font-size: 2rem; color: #bc00ff;">--</div>
            </div>
        </div>
        <div class="glass-card">
            <h3>本日の学習タスク</h3>
            <div id="today-list"></div>
        </div>
        <button onclick="switchView('progress')">今日の進捗を記録する</button>

        <div class="glass-card" style="margin-bottom: 15px;">
            <h3 style="font-size: 0.9rem; margin-bottom: 10px;">AI スケジューリング設定</h3>
            <div class="item-row" style="padding: 5px 0; border: none;">
                <span style="font-size: 0.9rem;">計画再開/開始日</span>
                <input type="date" id="sys-start-date" style="width: auto; margin: 0; padding: 8px;">
            </div>
        </div>
        <button id="main-plan-btn" onclick="generatePlan()" class="secondary">✨ AI学習計画を生成する</button>
    </div>

    <div id="view-settings" class="view">
        <div class="glass-card">
            <h3>新しい教材を追加する</h3>
            <input id="in-sub" placeholder="科目 (例: 数学、英語)">
            <div style="margin-bottom: 12px;">
                <label style="font-size: 0.8rem; color: var(--accent); display: block; margin-bottom: 4px;">試験日（または完了目標日）：</label>
                <input id="in-date" type="date" style="margin-bottom: 0;">
            </div>
            <div style="margin-bottom: 15px;">
                <label style="font-size: 0.8rem; color: var(--accent); display: block; margin-bottom: 4px;">この教材を学習する曜日：</label>
                <div class="checkbox-group" id="in-days">
                    <label><input type="checkbox" value="1" checked>月</label>
                    <label><input type="checkbox" value="2" checked>火</label>
                    <label><input type="checkbox" value="3" checked>水</label>
                    <label><input type="checkbox" value="4" checked>木</label>
                    <label><input type="checkbox" value="5" checked>金</label>
                    <label><input type="checkbox" value="6" checked>土</label>
                    <label><input type="checkbox" value="0" checked>日</label>
                </div>
            </div>
            <select id="in-mode" onchange="toggleMode()">
                <option value="range">ページ範囲 (1-200 など)</option>
                <option value="vol">合計件数 (1500語 など)</option>
                <option value="list">項目リスト (プリントAなど)</option>
                <option value="chunked">小刻み復習モード (チャンク分割)</option>
            </select>
            <div id="ui-range">
                <input id="in-name-range" placeholder="教材名">
                <input id="in-val-range" placeholder="範囲 (例: 1-150)">
                <input id="in-unit-range" value="P" placeholder="単位">
            </div>
            <div id="ui-vol" style="display:none;">
                <input id="in-name-vol" placeholder="教材名">
                <input id="in-val-vol" type="number" placeholder="合計件数">
                <input id="in-unit-vol" value="語" placeholder="単位">
            </div>
            <div id="ui-list" style="display:none;">
                <input id="in-name-list" placeholder="教材名">
                <textarea id="in-val-list" placeholder="項目をカンマ(,)で区切って入力" rows="3"></textarea>
            </div>
            <div id="ui-chunked" style="display:none;">
                <input id="in-name-chunked" placeholder="教材名">
                <div style="display:flex; gap:10px; flex-wrap:wrap;">
                    <input id="in-val-chunked-range" placeholder="範囲 (例: 1-150)" style="flex:2;">
                    <input id="in-chunk-size" type="number" value="10" placeholder="チャンクサイズ" style="flex:1;">
                </div>
                <input id="in-unit-chunked" value="P" placeholder="単位">
            </div>
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
                <span>目標周回数:</span>
                <input id="in-rounds" type="number" value="3" style="width: 80px; margin: 0;">
            </div>
            <button onclick="addMaterial()">この教材をリストに登録する</button>
        </div>
        <div class="glass-card">
            <h3>登録済みの教材</h3>
            <div id="registered-list"></div>
        </div>
    </div>

    <div id="view-progress" class="view">
        <h3>進捗の報告</h3>
        <div id="progress-input-area"></div>
    </div>

    <div id="view-plan" class="view">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; flex-wrap: wrap; gap: 10px;">
            <h3 style="margin: 0;">全日程の計画表</h3>
            <div style="display: flex; gap: 8px;">
                <button id="btn-edit-plan" onclick="togglePlanEdit()" class="secondary" style="width: auto; padding: 6px 15px; margin: 0; font-size: 0.8rem;">✎ 編集</button>
                <button id="btn-export-ics" onclick="exportICS()" class="success" style="width: auto; padding: 6px 15px; margin: 0; font-size: 0.8rem;" title="Googleカレンダー用ICSファイルをダウンロード">📅 カレンダー出力</button>
            </div>
        </div>
        <div id="full-plan-area"></div>
    </div>

    <script>
        // --- AUDIO ENGINE ---
        let audioCtx;

        function playSound(f, d) {
            try {
                if (!audioCtx) audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                const o = audioCtx.createOscillator();
                const g = audioCtx.createGain();
                o.connect(g);
                g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, audioCtx.currentTime);
                g.gain.setValueAtTime(0.05, audioCtx.currentTime);
                g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
                o.start();
                o.stop(audioCtx.currentTime + d);
            } catch (e) {}
        }

        // --- HELPER ---
        function toYMD(d) {
            return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2,
                '0');
        }

        function toYMDDateOnly(dStr) {
            const parts = dStr.split('-').map(Number);
            return new Date(parts[0], parts[1] - 1, parts[2]);
        }

        // --- DATA ---
        const KEY = 'replan_to_win_v7_data';
        let state = { exams: [], plan: {} };
        let isPlanEditing = false;

        function load() {
            const saved = localStorage.getItem(KEY);
            if (saved) {
                try {
                    state = JSON.parse(saved);
                } catch (e) {
                    console.error('データの読み込みに失敗しました', e);
                    state = { exams: [], plan: {} };
                }
            }
        }

        function save() {
            try {
                localStorage.setItem(KEY, JSON.stringify(state));
            } catch (e) {
                console.error('Storage Save Error', e);
            }
            render();
        }

        // --- UI ---
        function switchView(id) {
            playSound(600, 0.1);
            document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
            document.querySelectorAll('nav div').forEach(n => n.classList.remove('active'));
            const target = document.getElementById(`view-${id}`);
            if (target) {
                target.classList.add('active');
                const navItem = document.getElementById(`nav-${id}`);
                if (navItem) navItem.classList.add('active');
            }
        }

        function toggleMode() {
            const m = document.getElementById('in-mode').value;
            document.getElementById('ui-range').style.display = m === 'range' ? 'block' : 'none';
            document.getElementById('ui-vol').style.display = m === 'vol' ? 'block' : 'none';
            document.getElementById('ui-list').style.display = m === 'list' ? 'block' : 'none';
            document.getElementById('ui-chunked').style.display = m === 'chunked' ? 'block' : 'none';
        }

        function togglePlanEdit() {
            isPlanEditing = !isPlanEditing;
            const btn = document.getElementById('btn-edit-plan');
            btn.innerText = isPlanEditing ? '✔ 完了' : '✎ 編集';
            if (!isPlanEditing) playSound(800, 0.1);
            render();
        }

        function updatePlanManual(date, idx, value) {
            if (state.plan[date] && state.plan[date][idx]) {
                state.plan[date][idx].desc = value;
                localStorage.setItem(KEY, JSON.stringify(state));
            }
        }

        // --- LOGIC ---
        function addMaterial() {
            const sub = document.getElementById('in-sub').value.trim();
            const date = document.getElementById('in-date').value;
            if (!sub || !date) return alert('科目名と日付を入力してください');

            const selectedDays = Array.from(document.querySelectorAll('#in-days input[type="checkbox"]:checked')).map(cb =>
                parseInt(cb.value));
            if (selectedDays.length === 0) {
                return alert('教材を学習する曜日を1つ以上選択してください');
            }

            let exam = state.exams.find(e => e.subject === sub && e.date === date);
            if (!exam) {
                exam = { id: Date.now(), subject: sub, date: date, materials: [] };
                state.exams.push(exam);
            }

            const mode = document.getElementById('in-mode').value;
            const rounds = parseInt(document.getElementById('in-rounds').value) || 1;
            const mId = Date.now() + Math.floor(Math.random() * 10000);
            const common = { id: mId, rounds, days: selectedDays };

            let newMat;
            if (mode === 'range') {
                let val = document.getElementById('in-val-range').value;
                val = val.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, '');
                const m = val.match(/^(\d+)[-〜~ー](\d+)$/);
                if (!m) return alert('範囲は 1-100 の形式で入力してください');
                newMat = {
                    ...common,
                    type: 'range',
                    name: document.getElementById('in-name-range').value || '教材',
                    start: parseInt(m[1]),
                    end: parseInt(m[2]),
                    doneRounds: new Array(rounds).fill(0),
                    unit: document.getElementById('in-unit-range').value
                };
            } else if (mode === 'vol') {
                let val = document.getElementById('in-val-vol').value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(
                    0) - 0xFEE0));
                const total = parseInt(val);
                if (!total) return alert('合計件数を入力してください');
                newMat = {
                    ...common,
                    type: 'vol',
                    name: document.getElementById('in-name-vol').value || '教材',
                    total,
                    doneRounds: new Array(rounds).fill(0),
                    unit: document.getElementById('in-unit-vol').value
                };
            } else if (mode === 'list') {
                const items = document.getElementById('in-val-list').value.split(/[,、\n]/).filter(s => s.trim());
                if (items.length === 0) return alert('項目を入力してください');
                newMat = {
                    ...common,
                    type: 'list',
                    name: document.getElementById('in-name-list').value || '教材',
                    items: items.map(l => ({ l: l.trim(), d: 0 }))
                };
            } else if (mode === 'chunked') {
                let val = document.getElementById('in-val-chunked-range').value;
                val = val.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, '');
                const m = val.match(/^(\d+)[-〜~ー](\d+)$/);
                if (!m) return alert('チャンク分割では範囲を 1-100 の形式で入力してください');
                const chunkSize = parseInt(document.getElementById('in-chunk-size').value) || 10;
                if (chunkSize <= 0) return alert('チャンクサイズは1以上を指定してください');
                const start = parseInt(m[1]);
                const end = parseInt(m[2]);
                const totalUnits = end - start + 1;
                const chunks = [];
                for (let s = start; s <= end; s += chunkSize) {
                    const e = Math.min(s + chunkSize - 1, end);
                    chunks.push({ start: s, end: e, desc: `${s}〜${e}`, doneCount: 0 });
                }
                newMat = {
                    ...common,
                    type: 'chunked',
                    name: document.getElementById('in-name-chunked').value || '教材',
                    start,
                    end,
                    chunkSize,
                    chunks,
                    unit: document.getElementById('in-unit-chunked').value || 'P',
                    totalUnits
                };
            }

            if (!newMat) return;
            exam.materials.push(newMat);
            playSound(800, 0.2);
            save();
            alert('教材を登録しました');
        }

        function generatePlan() {
            if (state.exams.length === 0) return alert('先に教材を登録してください');
            playSound(400, 0.5);
            document.getElementById('loading').style.display = 'flex';

            setTimeout(() => {
                try {
                    state.plan = {};
                    const startDateInput = document.getElementById('sys-start-date').value;
                    let globalStart = startDateInput ? new Date(startDateInput) : new Date();
                    globalStart.setHours(0, 0, 0, 0);

                    state.exams.forEach(exam => {
                        const [ey, em, ed] = exam.date.split('-').map(Number);
                        const endDate = new Date(ey, em - 1, ed);
                        endDate.setHours(0, 0, 0, 0);

                        exam.materials.forEach(mat => {
                            const matDays = (mat.days && mat.days.length > 0) ? mat.days : [0, 1, 2, 3, 4, 5,
                                6
                            ];
                            let availableDates = [];
                            let curDate = new Date(globalStart);
                            while (curDate <= endDate) {
                                if (matDays.includes(curDate.getDay())) {
                                    availableDates.push(new Date(curDate));
                                }
                                curDate.setDate(curDate.getDate() + 1);
                            }
                            if (availableDates.length === 0) availableDates.push(new Date(globalStart));
                            const daysCount = availableDates.length;

                            if (mat.type === 'chunked') {
                                // 小刻み復習モードのアルゴリズム
                                const chunks = mat.chunks;
                                const rounds = mat.rounds;
                                // タスクキューを作成
                                let taskQueue = [];
                                if (rounds >= 1) {
                                    // 各チャンクについて (rounds - 1) 回連続で学習
                                    const preRounds = rounds - 1;
                                    if (preRounds > 0) {
                                        chunks.forEach(chunk => {
                                            for (let r = 1; r <= preRounds; r++) {
                                                taskQueue.push({
                                                    chunkIndex: chunks.indexOf(chunk),
                                                    desc: `${chunk.desc}${mat.unit || ''}`,
                                                    info: `${r}周目 (小刻み)`,
                                                    round: r
                                                });
                                            }
                                        });
                                    }
                                    // 最後の1周は全チャンクを1回ずつ
                                    chunks.forEach(chunk => {
                                        taskQueue.push({
                                            chunkIndex: chunks.indexOf(chunk),
                                            desc: `${chunk.desc}${mat.unit || ''}`,
                                            info: `${rounds}周目 (最終確認)`,
                                            round: rounds
                                        });
                                    });
                                }

                                const totalTasks = taskQueue.length;
                                if (totalTasks > 0 && daysCount > 0) {
                                    const perDay = Math.ceil(totalTasks / daysCount);
                                    let taskIdx = 0;
                                    for (let i = 0; i < daysCount && taskIdx < totalTasks; i++) {
                                        const k = toYMD(availableDates[i]);
                                        if (!state.plan[k]) state.plan[k] = [];
                                        let dayRem = perDay;
                                        while (dayRem > 0 && taskIdx < totalTasks) {
                                            const t = taskQueue[taskIdx];
                                            state.plan[k].push({
                                                sub: exam.subject,
                                                mat: mat.name,
                                                desc: t.desc,
                                                info: t.info,
                                                id: mat.id,
                                                chunkIndex: t.chunkIndex,
                                                round: t.round
                                            });
                                            taskIdx++;
                                            dayRem--;
                                        }
                                    }
                                }
                            } else if (mat.type === 'list') {
                                let queue = [];
                                for (let r = 1; r <= mat.rounds; r++) {
                                    mat.items.forEach(it => {
                                        if (it.d < r) queue.push({ l: it.l, r: r });
                                    });
                                }
                                const perDay = Math.ceil(queue.length / daysCount);
                                let cur = 0;
                                for (let i = 0; i < daysCount && cur < queue.length; i++) {
                                    const k = toYMD(availableDates[i]);
                                    if (!state.plan[k]) state.plan[k] = [];
                                    for (let j = 0; j < perDay && cur < queue.length; j++) {
                                        if (queue[cur]) {
                                            const t = queue[cur++];
                                            state.plan[k].push({
                                                sub: exam.subject,
                                                mat: mat.name,
                                                desc: t.l,
                                                info: `${t.r}周目`,
                                                id: mat.id
                                            });
                                        }
                                    }
                                }
                            } else {
                                let unitsPerRound = (mat.type === 'range' ? (mat.end - mat.start + 1) : mat.total);
                                if (!mat.doneRounds) mat.doneRounds = new Array(mat.rounds).fill(0);
                                while (mat.doneRounds.length < mat.rounds) mat.doneRounds.push(0);

                                let queue = [];
                                for (let r = 0; r < mat.rounds; r++) {
                                    let rem = unitsPerRound - (mat.doneRounds[r] || 0);
                                    if (rem > 0) {
                                        queue.push({
                                            r: r + 1,
                                            start: mat.type === 'range' ? (mat.start + (mat.doneRounds[r] ||
                                                0)) : null,
                                            rem
                                        });
                                    }
                                }

                                let totalRem = queue.reduce((sum, q) => sum + q.rem, 0);
                                if (totalRem > 0) {
                                    const perDay = Math.ceil(totalRem / daysCount);
                                    let qIdx = 0;
                                    for (let i = 0; i < daysCount && qIdx < queue.length; i++) {
                                        const k = toYMD(availableDates[i]);
                                        if (!state.plan[k]) state.plan[k] = [];
                                        let dayRem = perDay;
                                        while (dayRem > 0 && qIdx < queue.length) {
                                            let q = queue[qIdx];
                                            let amt = Math.min(dayRem, q.rem);
                                            let descText = mat.type === 'range' ?
                                                `${q.start}〜${q.start + amt - 1}${mat.unit||''}` :
                                                `${amt}${mat.unit||''}`;
                                            if (mat.type === 'range') q.start += amt;
                                            state.plan[k].push({
                                                sub: exam.subject,
                                                mat: mat.name,
                                                desc: descText,
                                                info: `${q.r}周目`,
                                                id: mat.id
                                            });
                                            q.rem -= amt;
                                            dayRem -= amt;
                                            if (q.rem <= 0) qIdx++;
                                        }
                                    }
                                }
                            }
                        });
                    });
                    save();
                    document.getElementById('loading').style.display = 'none';
                    playSound(1000, 0.3);
                    switchView('home');
                } catch (e) {
                    document.getElementById('loading').style.display = 'none';
                    console.error(e);
                    alert('エラーが発生しました');
                }
            }, 500);
        }

        function updateProg(matId, itIdx, val) {
            const m = findMat(matId);
            if (!m) return;

            if (m.type === 'chunked') {
                if (itIdx >= 0 && itIdx < m.chunks.length) {
                    const count = parseInt(val) || 0;
                    m.chunks[itIdx].doneCount = Math.max(0, Math.min(m.rounds, count));
                }
            } else if (m.type === 'list') {
                const r = parseInt(val) || 0;
                if (itIdx === -1) m.items.forEach(it => it.d = r);
                else if (itIdx < m.items.length) m.items[itIdx].d = r;
            } else {
                let parsed = 0;
                if (m.type === 'range' && typeof val === 'string' && val.match(/\d+[-〜~ー]\d+/)) {
                    let parts = val.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).split(
                        /[-〜~ー]/);
                    parsed = (parseInt(parts[1]) - m.start + 1) || 0;
                } else {
                    parsed = parseInt(val) || 0;
                }
                if (itIdx > 0) {
                    if (!m.doneRounds) m.doneRounds = new Array(m.rounds).fill(0);
                    while (m.doneRounds.length < m.rounds) m.doneRounds.push(0);
                    if (itIdx - 1 < m.doneRounds.length) {
                        m.doneRounds[itIdx - 1] = Math.max(0, parsed);
                    }
                }
            }
            save();
        }

        function deleteMat(eId, mId) {
            if (!confirm('削除しますか？')) return;
            const e = state.exams.find(ex => ex.id === eId);
            if (e) e.materials = e.materials.filter(m => m.id !== mId);
            Object.keys(state.plan).forEach(k => state.plan[k] = state.plan[k].filter(t => t.id !== mId));
            save();
        }

        function findMat(id) {
            for (let e of state.exams)
                for (let m of e.materials)
                    if (m.id == id) return m;
            return null;
        }

        // --- ICS Export ---
        function exportICS() {
            if (Object.keys(state.plan).length === 0) {
                return alert('計画がありません。先に計画を生成してください。');
            }
            playSound(700, 0.15);
            let icsContent = [
                'BEGIN:VCALENDAR',
                'VERSION:2.0',
                'PRODID:-//ReplanToWin//Learning Plan//JA',
                'CALSCALE:GREGORIAN',
                'METHOD:PUBLISH'
            ];

            const sortedDates = Object.keys(state.plan).sort();
            sortedDates.forEach(dateStr => {
                const tasks = state.plan[dateStr];
                if (!tasks || tasks.length === 0) return;

                // 日付をYYYYMMDD形式に変換
                const dateParts = dateStr.split('-');
                const dtStart = dateParts.join('');

                // 終日イベントの終了日は翌日
                const d = new Date(parseInt(dateParts[0]), parseInt(dateParts[1]) - 1, parseInt(dateParts[2]));
                d.setDate(d.getDate() + 1);
                const dtEnd = d.getFullYear() + String(d.getMonth() + 1).padStart(2, '0') + String(d.getDate()).padStart(2,
                    '0');

                // 件名: 科目名を列挙（重複除去）
                const subjects = [...new Set(tasks.map(t => t.sub))];
                const summary = '【' + subjects.join('・') + '】学習計画';

                // 説明: タスク詳細
                const descriptionLines = tasks.map(t => `${t.sub} - ${t.mat}: ${t.desc} (${t.info})`);
                const description = descriptionLines.join('\\n');

                // エスケープ処理
                const escapeICS = (str) => {
                    return str.replace(/[,;]/g, '\\$&').replace(/\n/g, '\\n');
                };

                icsContent.push('BEGIN:VEVENT');
                icsContent.push(`DTSTART;VALUE=DATE:${dtStart}`);
                icsContent.push(`DTEND;VALUE=DATE:${dtEnd}`);
                icsContent.push(`SUMMARY:${escapeICS(summary)}`);
                icsContent.push(`DESCRIPTION:${escapeICS(description)}`);
                icsContent.push('TRANSP:TRANSPARENT');
                icsContent.push('END:VEVENT');
            });

            icsContent.push('END:VCALENDAR');

            const blob = new Blob([icsContent.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const todayStr = toYMD(new Date()).replace(/-/g, '');
            a.download = `ReplanToWin_学習計画_${todayStr}.ics`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            playSound(900, 0.2);
        }

        // --- RENDER ---
        function render() {
            const today = toYMD(new Date());
            const hasPlan = Object.keys(state.plan).length > 0;
            document.getElementById('main-plan-btn').innerText = hasPlan ?
                '⚡ 進捗状況を解析し、AIが計画を再構築' :
                '✨ AI学習計画を新規生成する';

            // 全体進捗計算
            let tAll = 0,
                tDone = 0;
            state.exams.forEach(e => e.materials.forEach(m => {
                if (m.type === 'chunked') {
                    tAll += m.chunks.length * m.rounds;
                    tDone += m.chunks.reduce((s, ch) => s + (ch.doneCount || 0), 0);
                } else if (m.type === 'list') {
                    tAll += m.items.length * m.rounds;
                    tDone += m.items.reduce((s, i) => s + i.d, 0);
                } else {
                    let units = (m.type === 'range' ? (m.end - m.start + 1) : m.total);
                    tAll += units * m.rounds;
                    tDone += (m.doneRounds || []).reduce((a, b) => a + b, 0);
                }
            }));
            document.getElementById('stat-progress').innerText = Math.floor((tDone / (tAll || 1)) * 100) + '%';

            if (state.exams.length) {
                const dates = state.exams.map(e => new Date(e.date));
                const diff = Math.ceil((Math.min(...dates) - new Date().setHours(0, 0, 0, 0)) / 86400000);
                document.getElementById('stat-days').innerText = Math.max(0, diff) + '日';
            }

            const tasks = state.plan[today] || [];
            document.getElementById('today-list').innerHTML = tasks.length ?
                tasks.map(t => `
                    <div class="item-row">
                        <div><small>${t.sub}</small><br><b>${t.mat}: ${t.desc}</b></div>
                        <span class="status-tag">${t.info}</span>
                    </div>`).join('') :
                '<p style="text-align:center; opacity:0.5;">予定なし</p>';

            document.getElementById('registered-list').innerHTML = state.exams.map(e =>
                e.materials.map(m => {
                    let typeLabel = m.type === 'chunked' ? '小刻み復習' : m.type === 'list' ? 'リスト' : m
                        .type === 'range' ? '範囲' : '数量';
                    return `<div class="item-row">
                        <div><small>${e.subject} [${typeLabel}]</small><br><b>${m.name}</b></div>
                        <button class="danger" onclick="deleteMat(${e.id}, ${m.id})">削除</button>
                    </div>`;
                }).join('')
            ).join('') || '<p style="opacity:0.5;">登録なし</p>';

            // 進捗入力エリア
            document.getElementById('progress-input-area').innerHTML = state.exams.map(e =>
                e.materials.map(m => {
                    if (m.type === 'chunked') {
                        const chunks = m.chunks || [];
                        return `<div class="glass-card">
                            <h3>${m.name} <span class="small-text">(小刻み復習: ${m.start}〜${m.end}${m.unit||''} / チャンクサイズ ${m.chunkSize})</span></h3>
                            ${chunks.map((ch, idx) => `
                                <div class="item-row">
                                    <span>チャンク${idx+1}: ${ch.desc}${m.unit||''}</span>
                                    <input type="number" value="${ch.doneCount||0}" min="0" max="${m.rounds}" 
                                        onchange="updateProg(${m.id},${idx},this.value)" style="width:80px;">
                                    <span>/ ${m.rounds}回</span>
                                </div>
                            `).join('')}
                        </div>`;
                    } else if (m.type === 'list') {
                        return `<div class="glass-card">
                            <h3>${m.name}</h3>
                            <div class="item-row"><span>一括</span><input type="number" onchange="updateProg(${m.id},-1,this.value)" style="width:80px;"><span>周</span></div>
                            ${m.items.map((it, idx) => `
                                <div class="item-row">
                                    <span>${it.l}</span>
                                    <input type="number" value="${it.d}" onchange="updateProg(${m.id},${idx},this.value)" style="width:60px;">
                                </div>
                            `).join('')}
                        </div>`;
                    } else {
                        let drs = m.doneRounds || new Array(m.rounds).fill(0);
                        while (drs.length < m.rounds) drs.push(0);
                        let infoText = m.type === 'range' ? `全体範囲: ${m.start}〜${m.end}` : `全体量: ${m.total}`;
                        return `<div class="glass-card">
                            <h3>${m.name}</h3>
                            <div style="font-size: 0.8rem; color: #a0aec0; margin-bottom: 8px;">${infoText} ${m.unit||''}</div>
                            ${drs.map((dr, idx) => {
                                let val = dr;
                                if(m.type === 'range' && dr > 0) val = `${m.start}〜${m.start + dr - 1}`;
                                return `<div class="item-row">
                                    <span>${idx+1}周目</span>
                                    <input type="${m.type==='range'?'text':'number'}" value="${val}" onchange="updateProg(${m.id},${idx+1},this.value)" style="width:100px;">
                                    <span>${m.type==='range'?'':(m.unit||'')}</span>
                                </div>`;
                            }).join('')}
                        </div>`;
                    }
                }).join('')
            ).join('') || '<p style="opacity:0.5;">登録なし</p>';

            // 計画表
            let planHtml = '';
            Object.keys(state.plan).sort().forEach(d => {
                planHtml +=
                    `<h4 style="color:var(--accent); border-bottom:1px solid #333; margin-bottom:10px; margin-top:20px;">${d}</h4>`;
                state.plan[d].forEach((t, idx) => {
                    const content = isPlanEditing ?
                        `<input type="text" class="plan-edit-input" value="${t.desc}" oninput="updatePlanManual('${d}', ${idx}, this.value)">` :
                        `<b>${t.mat}: ${t.desc}</b>`;
                    planHtml +=
                        `<div class="item-row"><div style="flex: 1;"><small>${t.sub}</small><br>${content}</div><span class="status-tag">${t.info}</span></div>`;
                });
            });
            document.getElementById('full-plan-area').innerHTML = planHtml || '<p style="opacity:0.5;">計画がありません</p>';

            // カレンダー出力ボタンの表示制御
            const exportBtn = document.getElementById('btn-export-ics');
            if (exportBtn) {
                exportBtn.style.display = hasPlan ? 'inline-block' : 'none';
            }
        }

        window.onload = () => {
            load();
            document.getElementById('sys-start-date').value = toYMD(new Date());
            toggleMode();
            render();
            if ('serviceWorker' in navigator) {
                const sw =
                    "self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>{});";
                navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], { type: 'application/javascript' })))
                    .catch(() => {});
            }
        };

        window.addEventListener('beforeunload', save);
        window.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') save();
        });
    </script>
</body>
