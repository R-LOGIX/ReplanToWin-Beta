<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReplanToWin</title>
    <link rel="icon" href="854.png" type="image/png">
    <link rel="apple-touch-icon" href="854.png">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #020617;
            --panel: rgba(15, 23, 42, 0.95);
            --accent: #00f2ff;
            --accent-glow: rgba(0, 242, 255, 0.3);
            --text: #e2e8f0;
            --danger: #ff4757;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #0f172a 0%, #020617 100%);
            color: var(--text); font-family: 'Noto Sans JP', sans-serif; margin: 0; min-height: 100vh;
        }

        nav {
            display: flex; justify-content: space-around; background: rgba(0, 0, 0, 0.9);
            border-bottom: 2px solid var(--accent-glow); padding: 12px;
            position: sticky; top: 0; z-index: 1000;
        }
        nav div { cursor: pointer; font-size: 0.7rem; color: #64748b; font-family: 'Orbitron'; font-weight: bold; letter-spacing: 1px; }
        nav div.active { color: var(--accent); text-shadow: 0 0 10px var(--accent); }
        .nav-tut { font-size: 0.65rem !important; color: #475569 !important; font-family: 'Noto Sans JP', sans-serif !important; font-weight: normal !important; letter-spacing: 0 !important; }

        .view { max-width: 800px; margin: 20px auto; padding: 0 20px; display: none; }
        .view.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card {
            background: var(--panel); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px; padding: 20px; margin-bottom: 15px;
        }

        h3 { font-size: 1rem; color: var(--accent); margin-top: 0; border-left: 3px solid var(--accent); padding-left: 10px; }

        button {
            background: linear-gradient(135deg, var(--accent), #0099ff); color: #000;
            border: none; padding: 16px; border-radius: 8px; font-weight: bold; cursor: pointer; 
            width: 100%; font-size: 1rem; margin-bottom: 10px;
        }
        button:active { transform: scale(0.98); }
        button.secondary { background: transparent; border: 1px solid var(--accent); color: var(--accent); }
        button.danger { background: rgba(255, 71, 87, 0.1); border: 1px solid var(--danger); color: var(--danger); padding: 8px 12px; width: auto; font-size: 0.8rem; }

        input, select, textarea {
            background: rgba(0, 0, 0, 0.6); border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff; padding: 12px; border-radius: 8px; width: 100%; margin-bottom: 12px; font-size: 1rem;
        }

        /* 編集用入力欄のスタイル */
        .plan-edit-input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent);
            color: #fff;
            padding: 4px 8px;
            border-radius: 4px;
            width: 100%;
            font-size: 0.9rem;
            margin: 4px 0;
        }

        .item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .status-tag { font-size: 0.65rem; background: var(--accent); color: #000; padding: 2px 6px; border-radius: 4px; font-weight: bold; }

        .checkbox-group { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        .checkbox-group label { display: flex; align-items: center; gap: 5px; font-size: 0.9rem; cursor: pointer; color: #a0aec0; }
        .checkbox-group input[type="checkbox"] { width: 18px; height: 18px; margin: 0; accent-color: var(--accent); }

        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2, 6, 23, 0.95); z-index: 2000; display: none;
            flex-direction: column; align-items: center; justify-content: center;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        /* ===== ホームタイトル ===== */
        .home-title-block {
            text-align: center;
            padding: 18px 0 10px;
            margin-bottom: 10px;
        }
        .home-title-block .app-logo {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.7rem;
            font-weight: 700;
            color: var(--accent);
            text-shadow: 0 0 18px var(--accent), 0 0 40px rgba(0,242,255,0.4);
            letter-spacing: 2px;
        }
        .home-title-block .app-tagline {
            font-size: 0.72rem;
            color: #64748b;
            margin-top: 4px;
            letter-spacing: 1px;
        }

        /* ===== 小刻み復習バッジ ===== */
        .spaced-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, rgba(188,0,255,0.15), rgba(0,242,255,0.15));
            border: 1px solid rgba(188,0,255,0.5);
            border-radius: 8px;
            padding: 10px 14px;
            width: 100%;
            cursor: pointer;
            transition: box-shadow 0.2s;
        }
        .spaced-badge:hover { box-shadow: 0 0 12px rgba(188,0,255,0.4); }
        .spaced-badge input[type="checkbox"] {
            width: 20px; height: 20px; margin: 0; accent-color: #bc00ff; flex-shrink: 0;
        }
        .spaced-badge-text { display: flex; flex-direction: column; gap: 2px; flex: 1; }
        .spaced-badge-title {
            font-size: 0.92rem;
            font-weight: bold;
            color: #bc00ff;
            text-shadow: 0 0 8px rgba(188,0,255,0.6);
        }
        .spaced-badge-sub {
            font-size: 0.68rem;
            color: #a78bfa;
            line-height: 1.4;
        }
        .spaced-badge-recommend {
            font-size: 0.62rem;
            background: linear-gradient(90deg, #bc00ff, #00f2ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: bold;
            white-space: nowrap;
        }

        /* ===== エクスポート/インポートボタン ===== */
        .io-btn-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .io-btn-row button {
            flex: 1;
            font-size: 0.78rem;
            padding: 10px 6px;
            margin-bottom: 0;
        }

        /* ===== チュートリアルオーバーレイ ===== */
        #tutorial-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(2,6,23,0.96);
            z-index: 3000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        #tutorial-overlay.show { display: flex; animation: fadeIn 0.3s ease; }
        .tut-card {
            background: var(--panel);
            border: 1px solid var(--accent);
            border-radius: 16px;
            padding: 28px 24px;
            max-width: 460px;
            width: 100%;
            text-align: center;
        }
        .tut-step-num {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--accent);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .tut-icon { font-size: 2.8rem; margin-bottom: 12px; }
        .tut-title {
            font-size: 1.1rem;
            font-weight: bold;
            color: var(--accent);
            margin-bottom: 12px;
        }
        .tut-body {
            font-size: 0.88rem;
            color: #a0aec0;
            line-height: 1.75;
            margin-bottom: 22px;
            text-align: left;
        }
        .tut-body b { color: var(--text); }
        .tut-dots {
            display: flex; justify-content: center; gap: 8px; margin-bottom: 20px;
        }
        .tut-dot {
            width: 8px; height: 8px; border-radius: 50%;
            background: #334155;
            transition: background 0.2s;
        }
        .tut-dot.active { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
        .tut-btn-row { display: flex; gap: 10px; }
        .tut-btn-row button { margin-bottom: 0; }
    </style>
</head>
<body>

<div id="loading">
    <div style="font-size: 3rem; animation: pulse 1s infinite;">⚡</div>
    <div style="font-family: 'Orbitron'; color: var(--accent); letter-spacing: 3px; margin-top: 15px;">AI GENERATING...</div>
</div>

<nav>
    <div onclick="switchView('home')" id="nav-home" class="active">ホーム</div>
    <div onclick="switchView('settings')" id="nav-settings">1. 教材登録</div>
    <div onclick="switchView('progress')" id="nav-progress">2. 進捗入力</div>
    <div onclick="switchView('plan')" id="nav-plan">3. 計画表</div>
    <div onclick="showTutorial()" class="nav-tut">？使い方</div>
</nav>

<div id="view-home" class="view active">
    <!-- タイトルブロック -->
    <div class="home-title-block">
        <div class="app-logo">ReplanToWin</div>
        <div class="app-tagline">AI-Powered Study Scheduler</div>
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
        <div class="glass-card" style="text-align: center;">
            <small style="opacity:0.6;">全体の進捗</small>
            <div id="stat-progress" style="font-family: 'Orbitron'; font-size: 2rem; color: var(--accent);">0%</div>
        </div>
        <div class="glass-card" style="text-align: center;">
            <small style="opacity:0.6;">最短の試験まで</small>
            <div id="stat-days" style="font-family: 'Orbitron'; font-size: 2rem; color: #bc00ff;">--</div>
        </div>
    </div>
    <div class="glass-card">
        <h3>本日の学習タスク</h3>
        <div id="today-list"></div>
    </div>
    <button onclick="switchView('progress')">今日の進捗を記録する</button>

    <div class="glass-card" style="margin-bottom: 15px;">
        <h3 style="font-size: 0.9rem; margin-bottom: 10px;">AI スケジューリング設定</h3>
        <div class="item-row" style="padding: 5px 0; border: none;">
            <span style="font-size: 0.9rem;">計画再開/開始日</span>
            <input type="date" id="sys-start-date" style="width: auto; margin: 0; padding: 8px;">
        </div>
    </div>

    <button id="main-plan-btn" onclick="generatePlan()" class="secondary">✨ AI学習計画を生成する</button>

    <div class="glass-card">
        <h3 style="font-size:0.9rem;">📅 計画データ（Google カレンダー連携）</h3>
        <p style="font-size:0.78rem; color:#a0aec0; margin:0 0 6px;">ICS形式でエクスポートし、Googleカレンダーに「終日タスク」として読み込めます。</p>
        <div class="io-btn-row">
            <button class="secondary" onclick="exportICS()" style="font-size:0.78rem;">⬆ ICSエクスポート</button>
            <button class="secondary" onclick="document.getElementById('ics-import-input').click()" style="font-size:0.78rem;">⬇ ICSインポート</button>
        </div>
        <input type="file" id="ics-import-input" accept=".ics" style="display:none;" onchange="importICS(this)">
    </div>
</div>

<div id="view-settings" class="view">
    <div class="glass-card">
        <h3>新しい教材を追加する</h3>
        <input id="in-sub" placeholder="科目 (例: 数学、英語)">
        
        <div style="margin-bottom: 12px;">
            <label style="font-size: 0.8rem; color: var(--accent); display: block; margin-bottom: 4px;">試験日（または完了目標日）：</label>
            <input id="in-date" type="date" style="margin-bottom: 0;">
        </div>

        <div style="margin-bottom: 15px;">
            <label style="font-size: 0.8rem; color: var(--accent); display: block; margin-bottom: 4px;">この教材を学習する曜日：</label>
            <div class="checkbox-group" id="in-days">
                <label><input type="checkbox" value="1" checked>月</label>
                <label><input type="checkbox" value="2" checked>火</label>
                <label><input type="checkbox" value="3" checked>水</label>
                <label><input type="checkbox" value="4" checked>木</label>
                <label><input type="checkbox" value="5" checked>金</label>
                <label><input type="checkbox" value="6" checked>土</label>
                <label><input type="checkbox" value="0" checked>日</label>
            </div>
        </div>

        <select id="in-mode" onchange="toggleMode()">
            <option value="range">ページ範囲 (1-200 など)</option>
            <option value="vol">合計件数 (1500語 など)</option>
            <option value="list">項目リスト (プリントAなど)</option>
        </select>
        <div id="ui-range">
            <input id="in-name-range" placeholder="教材名">
            <input id="in-val-range" placeholder="範囲 (例: 1-150)">
            <input id="in-unit-range" value="P" placeholder="単位">
        </div>
        <div id="ui-vol" style="display:none;">
            <input id="in-name-vol" placeholder="教材名">
            <input id="in-val-vol" type="number" placeholder="合計件数">
            <input id="in-unit-vol" value="語" placeholder="単位">
        </div>
        <div id="ui-list" style="display:none;">
            <input id="in-name-list" placeholder="教材名">
            <textarea id="in-val-list" placeholder="項目をカンマ(,)で区切って入力" rows="3"></textarea>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 15px;">
            <span>目標周回数:</span>
            <input id="in-rounds" type="number" value="3" style="width: 80px; margin: 0;">
        </div>

        <!-- ▼▼▼ 変更点2: 間隔反復学習バッジの説明文 ▼▼▼ -->
        <label id="spaced-label" class="spaced-badge" style="margin-bottom: 15px;">
            <input type="checkbox" id="in-spaced">
            <span class="spaced-badge-text">
                <span class="spaced-badge-title">⚡ 間隔反復学習（スペーシング効果）</span>
                <span class="spaced-badge-sub">「小刻みな復習」を繰り返す記憶定着アルゴリズム。<br><b>単語帳・問題集など量の多いタスクに特に推奨。</b><br>単純繰り返しより最大 <b>2〜3倍</b> の記憶効率を実現。</span>
            </span>
            <span class="spaced-badge-recommend">強く推奨</span>
            <span id="spaced-note" style="display: none; color: var(--danger); font-size: 0.7rem;">※リスト教材では非対応</span>
        </label>
        <!-- ▲▲▲ 変更点2 ここまで ▲▲▲ -->

        <button onclick="addMaterial()">この教材をリストに登録する</button>
    </div>
    <div class="glass-card">
        <h3>登録済みの教材</h3>
        <div id="registered-list"></div>
    </div>
</div>

<div id="view-progress" class="view">
    <h3>進捗の報告</h3>
    <div id="progress-input-area"></div>
</div>

<div id="view-plan" class="view">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
        <h3 style="margin: 0;">全日程の計画表</h3>
        <button id="btn-edit-plan" onclick="togglePlanEdit()" class="secondary" style="width: auto; padding: 6px 15px; margin: 0; font-size: 0.8rem;">✎ 編集</button>
    </div>
    <div id="full-plan-area"></div>
</div>

<!-- ===== チュートリアルオーバーレイ ===== -->
<div id="tutorial-overlay">
    <div class="tut-card">
        <div class="tut-step-num" id="tut-step-label">STEP 1 / 4</div>
        <div class="tut-icon" id="tut-icon">📚</div>
        <div class="tut-title" id="tut-title"></div>
        <div class="tut-body" id="tut-body"></div>
        <div class="tut-dots" id="tut-dots"></div>
        <div class="tut-btn-row">
            <button class="secondary" id="tut-prev-btn" onclick="tutPrev()" style="display:none;">← 戻る</button>
            <button id="tut-next-btn" onclick="tutNext()">次へ →</button>
        </div>
    </div>
</div>

<script>
// ===== TUTORIAL =====
const TUT_STEPS = [
    {
        icon: '🚀',
        title: 'ReplanToWin へようこそ！',
        body: `AI が学習スケジュールを自動生成するアプリです。<br><br>
<b>基本の流れ：</b><br>
① <b>教材を登録</b> する（科目・範囲・試験日）<br>
② <b>AI が計画を生成</b> する<br>
③ <b>毎日の進捗</b> を記録する<br>
④ AI が<b>計画を自動更新</b> する`
    },
    {
        icon: '📖',
        title: 'STEP 1 ── 教材を登録する',
        body: `「<b>1. 教材登録</b>」タブへ移動します。<br><br>
・ <b>科目名</b>（例: 英語）と<b>試験日</b>を入力<br>
・ <b>教材の種類</b>を選択：<br>
　　<b>ページ範囲</b>（例: 1-200P）<br>
　　<b>合計件数</b>（例: 1500語）<br>
　　<b>項目リスト</b>（例: 単語帳の項目）<br>
・ <b>学習する曜日</b>と<b>目標周回数</b>を設定<br><br>
⚡ <b>間隔反復学習</b>は記憶効率が大幅に上がるため<b>強く推奨</b>です！`
    },
    {
        icon: '✨',
        title: 'STEP 2 ── AI 計画を生成する',
        body: `教材を登録したら、<b>ホーム画面</b>へ戻ります。<br><br>
・ <b>「計画再開/開始日」</b>を確認（デフォルトは今日）<br>
・ <b>「AI学習計画を生成する」</b>ボタンを押す<br><br>
AI が試験日から逆算し、全日程のスケジュールを自動生成します。<br><br>
進捗を記録した後に<b>再生成</b>すると、残り分だけ再スケジューリングされます。`
    },
    {
        icon: '📅',
        title: 'STEP 3 ── Google カレンダーに取り込む',
        body: `<b>「3. 計画表」</b>タブまたはホームの<b>「ICSエクスポート」</b>ボタンで<br>計画を <b>.ics ファイル</b>としてダウンロードできます。<br><br>
<b>Google カレンダーへの取り込み手順：</b><br>
① Google カレンダーを開く<br>
② 設定 → 「インポート」を選択<br>
③ ダウンロードした .ics ファイルを選択<br>
④ 各学習タスクが<b>終日イベント</b>として追加されます。<br><br>
進捗を記録して計画を更新したら、再度エクスポートしてください。`
    }
];
let tutStep = 0;

function showTutorial() {
    tutStep = 0;
    renderTut();
    document.getElementById('tutorial-overlay').classList.add('show');
}

function closeTutorial() {
    document.getElementById('tutorial-overlay').classList.remove('show');
    localStorage.setItem('rtw_tut_done', '1');
}

function tutNext() {
    if (tutStep < TUT_STEPS.length - 1) {
        tutStep++;
        renderTut();
    } else {
        closeTutorial();
    }
}

function tutPrev() {
    if (tutStep > 0) { tutStep--; renderTut(); }
}

function renderTut() {
    const s = TUT_STEPS[tutStep];
    const total = TUT_STEPS.length;
    document.getElementById('tut-step-label').innerText = `STEP ${tutStep + 1} / ${total}`;
    document.getElementById('tut-icon').innerText = s.icon;
    document.getElementById('tut-title').innerText = s.title;
    document.getElementById('tut-body').innerHTML = s.body;
    const dots = document.getElementById('tut-dots');
    dots.innerHTML = TUT_STEPS.map((_, i) => `<div class="tut-dot${i === tutStep ? ' active' : ''}"></div>`).join('');
    document.getElementById('tut-prev-btn').style.display = tutStep > 0 ? 'block' : 'none';
    document.getElementById('tut-next-btn').innerText = tutStep < total - 1 ? '次へ →' : '✔ 始める';
}

// ===== ICS EXPORT/IMPORT =====
function escICS(s) {
    return String(s).replace(/\\/g, '\\\\').replace(/;/g, '\\;').replace(/,/g, '\\,').replace(/\r?\n/g, '\\n');
}

function toICSDate(dateStr) {
    return dateStr.replace(/-/g, '');
}

function exportICS() {
    const planKeys = Object.keys(state.plan).sort();
    if (planKeys.length === 0) return alert('エクスポートする計画がありません。先にAI計画を生成してください。');

    const now = new Date();
    const dtstamp = now.getFullYear()
        + String(now.getMonth()+1).padStart(2,'0')
        + String(now.getDate()).padStart(2,'0')
        + 'T' + String(now.getHours()).padStart(2,'0')
        + String(now.getMinutes()).padStart(2,'0')
        + String(now.getSeconds()).padStart(2,'0') + 'Z';

    let ics = [
        'BEGIN:VCALENDAR',
        'VERSION:2.0',
        'PRODID:-//ReplanToWin//AI Study Scheduler//JA',
        'CALSCALE:GREGORIAN',
        'METHOD:PUBLISH'
    ];

    planKeys.forEach(dateStr => {
        const tasks = state.plan[dateStr];
        if (!tasks || tasks.length === 0) return;
        const dateICS = toICSDate(dateStr);
        const summary = tasks.map(t => `${t.sub}:${t.mat} ${t.desc}(${t.info})`).join(' / ');
        const uid = `rtw-${dateStr}-${Date.now()}@replantowin`;
        ics = ics.concat([
            'BEGIN:VEVENT',
            `DTSTART;VALUE=DATE:${dateICS}`,
            `DTEND;VALUE=DATE:${dateICS}`,
            `DTSTAMP:${dtstamp}`,
            `UID:${uid}`,
            `SUMMARY:${escICS(summary)}`,
            `DESCRIPTION:${escICS(tasks.map(t=>`${t.sub} / ${t.mat}: ${t.desc} [${t.info}]`).join('\n'))}`,
            'TRANSP:TRANSPARENT',
            'END:VEVENT'
        ]);
    });

    ics.push('END:VCALENDAR');
    const blob = new Blob([ics.join('\r\n')], { type: 'text/calendar;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `ReplanToWin_${toYMD(new Date())}.ics`;
    a.click();
    URL.revokeObjectURL(a.href);
    playSound(800, 0.2);
}

function importICS(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        try {
            const text = e.target.result;
            const newPlan = {};
            const events = text.split('BEGIN:VEVENT').slice(1);
            events.forEach(ev => {
                const dtmatch = ev.match(/DTSTART(?:;VALUE=DATE)?:(\d{4})(\d{2})(\d{2})/);
                const summatch = ev.match(/SUMMARY:(.+)/);
                if (!dtmatch || !summatch) return;
                const dateStr = `${dtmatch[1]}-${dtmatch[2]}-${dtmatch[3]}`;
                const summaryRaw = summatch[1].replace(/\\n/g,'\n').replace(/\\,/g,',').replace(/\\;/g,';').replace(/\\\\/g,'\\').trim();
                if (!newPlan[dateStr]) newPlan[dateStr] = [];
                summaryRaw.split(' / ').forEach(item => {
                    const m = item.match(/^([^:]+):(.+?)\s+(.+?)\((.+?)\)$/);
                    if (m) {
                        newPlan[dateStr].push({ sub: m[1].trim(), mat: m[2].trim(), desc: m[3].trim(), info: m[4].trim(), id: 0 });
                    } else {
                        newPlan[dateStr].push({ sub: 'インポート', mat: item, desc: '', info: '', id: 0 });
                    }
                });
            });
            const count = Object.keys(newPlan).length;
            if (count === 0) { alert('有効なイベントが見つかりませんでした。'); return; }
            if (!confirm(`${count}日分の計画をインポートします。\n現在の計画は上書きされます。よろしいですか？`)) return;
            state.plan = newPlan;
            save();
            playSound(800, 0.2);
            alert(`${count}日分の計画をインポートしました。`);
        } catch(err) {
            console.error(err);
            alert('ICSファイルの読み込みに失敗しました。');
        }
        input.value = '';
    };
    reader.readAsText(file);
}

// --- AUDIO ENGINE ---
let audioCtx;
function playSound(f, d) {
    try {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.connect(g); g.connect(audioCtx.destination);
        o.frequency.setValueAtTime(f, audioCtx.currentTime);
        g.gain.setValueAtTime(0.05, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + d);
        o.start(); o.stop(audioCtx.currentTime + d);
    } catch(e) {}
}

// --- HELPER ---
function toYMD(d) {
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

// --- DATA ---
const KEY = 'test_os_v6_1_data';
let state = { exams: [], plan: {} };
let isPlanEditing = false; 

function load() {
    const saved = localStorage.getItem(KEY);
    if (saved) state = JSON.parse(saved);
}

function save() {
    try {
        localStorage.setItem(KEY, JSON.stringify(state));
    } catch(e) {
        console.error('Storage Save Error', e);
    }
    render();
}

// --- UI ---
function switchView(id) {
    playSound(600, 0.1);
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.querySelectorAll('nav div').forEach(n => n.classList.remove('active'));
    const target = document.getElementById(`view-${id}`);
    if (target) {
        target.classList.add('active');
        document.getElementById(`nav-${id}`).classList.add('active');
    }
}

function toggleMode() {
    const m = document.getElementById('in-mode').value;
    document.getElementById('ui-range').style.display = m === 'range' ? 'block' : 'none';
    document.getElementById('ui-vol').style.display = m === 'vol' ? 'block' : 'none';
    document.getElementById('ui-list').style.display = m === 'list' ? 'block' : 'none';
    updateSpacedUI();
}

function updateSpacedUI() {
    const mode = document.getElementById('in-mode').value;
    const spacedCheck = document.getElementById('in-spaced');
    const spacedNote = document.getElementById('spaced-note');
    if (mode === 'list') {
        spacedCheck.disabled = true;
        spacedCheck.parentElement.style.opacity = '0.6';
        if (spacedNote) spacedNote.style.display = 'inline';
    } else {
        spacedCheck.disabled = false;
        spacedCheck.parentElement.style.opacity = '1';
        if (spacedNote) spacedNote.style.display = 'none';
    }
}

function togglePlanEdit() {
    isPlanEditing = !isPlanEditing;
    const btn = document.getElementById('btn-edit-plan');
    btn.innerText = isPlanEditing ? '✔ 完了' : '✎ 編集';
    if (!isPlanEditing) playSound(800, 0.1);
    render();
}

function updatePlanManual(date, idx, value) {
    if (state.plan[date] && state.plan[date][idx]) {
        state.plan[date][idx].desc = value;
        localStorage.setItem(KEY, JSON.stringify(state));
    }
}

// --- LOGIC ---
function addMaterial() {
    const sub = document.getElementById('in-sub').value.trim();
    const date = document.getElementById('in-date').value;
    if (!sub || !date) return alert('科目名と日付を入力してください');

    let selectedDays = Array.from(document.querySelectorAll('#sys-days input[type="checkbox"]:checked')).map(cb => parseInt(cb.value));
    if (selectedDays.length === 0) {
        const activeView = document.querySelector('.view.active');
        if (activeView) {
            selectedDays = Array.from(activeView.querySelectorAll('input[type="checkbox"]:checked')).map(cb => parseInt(cb.value));
        }
    }

    if (selectedDays.length === 0) {
        return alert('教材を学習する曜日を1つ以上選択してください');
    }

    let exam = state.exams.find(e => e.subject === sub && e.date === date);
    if (!exam) {
        exam = { id: Date.now(), subject: sub, date: date, materials: [] };
        state.exams.push(exam);
    }

    const mode = document.getElementById('in-mode').value;
    const rounds = parseInt(document.getElementById('in-rounds').value) || 1;
    const mId = Date.now() + Math.floor(Math.random() * 10000);

    let newMat;
    const common = { id: mId, rounds, days: selectedDays };
    const spaced = document.getElementById('in-spaced').checked && mode !== 'list';

    if (mode === 'range') {
        let val = document.getElementById('in-val-range').value;
        val = val.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).replace(/\s+/g, '');
        const m = val.match(/^(\d+)[-〜~ー](\d+)$/);
        if (!m) return alert('範囲は 1-100 の形式で入力してください');
        newMat = { ...common, type: 'range', name: document.getElementById('in-name-range').value || '教材', start: parseInt(m[1]), end: parseInt(m[2]), doneRounds: new Array(rounds).fill(0), unit: document.getElementById('in-unit-range').value, spaced };
    } else if (mode === 'vol') {
        let val = document.getElementById('in-val-vol').value.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
        const total = parseInt(val);
        if (!total) return alert('合計件数を入力してください');
        newMat = { ...common, type: 'vol', name: document.getElementById('in-name-vol').value || '教材', total, doneRounds: new Array(rounds).fill(0), unit: document.getElementById('in-unit-vol').value, spaced };
    } else {
        const items = document.getElementById('in-val-list').value.split(/[,、\n]/).filter(s => s.trim());
        if (items.length === 0) return alert('項目を入力してください');
        newMat = { ...common, type: 'list', name: document.getElementById('in-name-list').value || '教材', items: items.map(l => ({ l: l.trim(), d: 0 })), spaced: false };
    }

    exam.materials.push(newMat);
    playSound(800, 0.2);
    save(); 
    alert('教材を登録しました');
}

function generatePlan() {
    if (state.exams.length === 0) return alert('先に教材を登録してください');
    
    playSound(400, 0.5);
    document.getElementById('loading').style.display = 'flex';

    setTimeout(() => {
        try {
            state.plan = {};
            const startDateInput = document.getElementById('sys-start-date').value;
            let globalStart = startDateInput ? new Date(startDateInput) : new Date();
            globalStart.setHours(0,0,0,0);

            state.exams.forEach(exam => {
                const [ey, em, ed] = exam.date.split('-').map(Number);
                const endDate = new Date(ey, em - 1, ed);
                endDate.setHours(0,0,0,0);
                
                exam.materials.forEach(mat => {
                    const matDays = (mat.days && mat.days.length > 0) ? mat.days : [0,1,2,3,4,5,6];
                    let availableDates = [];
                    let curDate = new Date(globalStart);
                    while (curDate < endDate) {
                        if (matDays.includes(curDate.getDay())) {
                            availableDates.push(new Date(curDate));
                        }
                        curDate.setDate(curDate.getDate() + 1);
                    }
                    if (availableDates.length === 0) availableDates.push(new Date(globalStart));
                    const daysCount = availableDates.length;

                    if (mat.spaced && mat.type !== 'list') {
                        const totalUnits = mat.type === 'range' ? (mat.end - mat.start + 1) : mat.total;
                        const totalAmount = totalUnits * mat.rounds;
                        const avgDaily = totalAmount / daysCount;
                        let chunkSize = Math.ceil(avgDaily);
                        if (chunkSize < 1) chunkSize = 1;
                        const numChunks = Math.ceil(totalUnits / chunkSize);

                        if (daysCount >= numChunks * (mat.rounds - 1) + 1) {
                            let chunks = [];
                            let unit = mat.unit || '';
                            for (let i = 0; i < numChunks; i++) {
                                let start, end;
                                if (mat.type === 'range') {
                                    start = mat.start + i * chunkSize;
                                    end = Math.min(mat.start + (i + 1) * chunkSize - 1, mat.end);
                                } else {
                                    start = i * chunkSize + 1;
                                    end = Math.min((i + 1) * chunkSize, mat.total);
                                }
                                chunks.push({ start, end });
                            }

                            let dayIdx = 0;

                            for (let i = 0; i < numChunks; i++) {
                                for (let r = 1; r < mat.rounds; r++) {
                                    if (dayIdx >= daysCount) break;
                                    const k = toYMD(availableDates[dayIdx]);
                                    if (!state.plan[k]) state.plan[k] = [];
                                    const desc = mat.type === 'range' || mat.type === 'vol' ? `${chunks[i].start}〜${chunks[i].end}${unit}` : `C${i+1}`;
                                    state.plan[k].push({
                                        sub: exam.subject,
                                        mat: mat.name,
                                        desc: desc,
                                        info: `${r}周目`,
                                        id: mat.id
                                    });
                                    dayIdx++;
                                }
                            }

                            let remainingDays = daysCount - dayIdx;
                            if (remainingDays > 0) {
                                for (let i = 0; i < numChunks; i++) {
                                    let targetIdx;
                                    if (remainingDays >= numChunks) {
                                        targetIdx = dayIdx + i;
                                    } else {
                                        targetIdx = dayIdx + Math.floor(i * remainingDays / numChunks);
                                    }
                                    if (targetIdx >= daysCount) targetIdx = daysCount - 1;
                                    const k = toYMD(availableDates[targetIdx]);
                                    if (!state.plan[k]) state.plan[k] = [];
                                    const desc = mat.type === 'range' || mat.type === 'vol' ? `${chunks[i].start}〜${chunks[i].end}${unit}` : `C${i+1}`;
                                    state.plan[k].push({
                                        sub: exam.subject,
                                        mat: mat.name,
                                        desc: desc,
                                        info: `${mat.rounds}周目`,
                                        id: mat.id
                                    });
                                }
                            } else {
                                let lastIdx = daysCount - 1;
                                const k = toYMD(availableDates[lastIdx]);
                                for (let i = 0; i < numChunks; i++) {
                                    const desc = mat.type === 'range' || mat.type === 'vol' ? `${chunks[i].start}〜${chunks[i].end}${unit}` : `C${i+1}`;
                                    state.plan[k].push({
                                        sub: exam.subject,
                                        mat: mat.name,
                                        desc: desc,
                                        info: `${mat.rounds}周目`,
                                        id: mat.id
                                    });
                                }
                            }
                            return;
                        }
                    }

                    if (mat.type === 'list') {
                        let queue = [];
                        for (let r = 1; r <= mat.rounds; r++) {
                            mat.items.forEach(it => { if (it.d < r) queue.push({ l: it.l, r: r }); });
                        }
                        const perDay = Math.ceil(queue.length / daysCount);
                        let cur = 0;
                        for (let i=0; i<daysCount && cur<queue.length; i++) {
                            const k = toYMD(availableDates[i]);
                            if (!state.plan[k]) state.plan[k] = [];
                            for (let j=0; j<perDay && cur<queue.length; j++) {
                                if (queue[cur]) {
                                    const t = queue[cur++];
                                    state.plan[k].push({ sub: exam.subject, mat: mat.name, desc: t.l, info: `${t.r}周目`, id: mat.id });
                                }
                            }
                        }
                    } else {
                        let unitsPerRound = (mat.type === 'range' ? (mat.end - mat.start + 1) : mat.total);
                        if (!mat.doneRounds) mat.doneRounds = new Array(mat.rounds).fill(0);

                        let queue = [];
                        for (let r=0; r<mat.rounds; r++) {
                            let rem = unitsPerRound - (mat.doneRounds[r] || 0);
                            if (rem > 0) {
                                queue.push({ r: r+1, start: mat.type === 'range' ? (mat.start + (mat.doneRounds[r]||0)) : null, rem });
                            }
                        }

                        let totalRem = queue.reduce((sum, q) => sum + q.rem, 0);
                        if (totalRem > 0) {
                            const perDay = Math.ceil(totalRem / daysCount);
                            let qIdx = 0;
                            for (let i=0; i<daysCount && qIdx < queue.length; i++) {
                                const k = toYMD(availableDates[i]);
                                if (!state.plan[k]) state.plan[k] = [];
                                let dayRem = perDay;
                                while (dayRem > 0 && qIdx < queue.length) {
                                    let q = queue[qIdx];
                                    let amt = Math.min(dayRem, q.rem);
                                    let descText = mat.type === 'range' ? `${q.start}〜${q.start + amt - 1}${mat.unit||''}` : `${amt}${mat.unit||''}`;
                                    if (mat.type === 'range') q.start += amt;
                                    state.plan[k].push({ sub: exam.subject, mat: mat.name, desc: descText, info: `${q.r}周目`, id: mat.id });
                                    q.rem -= amt; dayRem -= amt;
                                    if (q.rem <= 0) qIdx++;
                                }
                            }
                        }
                    }
                });
            });
            save();
            document.getElementById('loading').style.display = 'none';
            playSound(1000, 0.3);
            switchView('home');
        } catch (e) {
            document.getElementById('loading').style.display = 'none';
            console.error(e);
            alert('エラーが発生しました');
        }
    }, 500);
}

function updateProg(matId, itIdx, val) {
    const m = findMat(matId);
    if (!m) return;
    if (m.type === 'list') {
        const r = parseInt(val) || 0;
        if (itIdx === -1) m.items.forEach(it => it.d = r);
        else m.items[itIdx].d = r;
    } else {
        let parsed = 0;
        if (m.type === 'range' && typeof val === 'string' && val.match(/\d+[-〜~ー]\d+/)) {
            let parts = val.replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)).split(/[-〜~ー]/);
            parsed = (parseInt(parts[1]) - m.start + 1) || 0;
        } else {
            parsed = parseInt(val) || 0;
        }
        if (itIdx > 0) {
            if (!m.doneRounds) m.doneRounds = new Array(m.rounds).fill(0);
            while(m.doneRounds.length < m.rounds) m.doneRounds.push(0);
            m.doneRounds[itIdx-1] = Math.max(0, parsed);
        }
    }
    save();
}

function deleteMat(eId, mId) {
    if(!confirm('削除しますか？')) return;
    const e = state.exams.find(ex => ex.id === eId);
    if (e) e.materials = e.materials.filter(m => m.id !== mId);
    Object.keys(state.plan).forEach(k => state.plan[k] = state.plan[k].filter(t => t.id !== mId));
    save();
}

function findMat(id) {
    for (let e of state.exams) for (let m of e.materials) if (m.id == id) return m;
    return null;
}

function render() {
    const today = toYMD(new Date()); 
    const hasPlan = Object.keys(state.plan).length > 0;
    document.getElementById('main-plan-btn').innerText = hasPlan ? '⚡ 進捗状況を解析し、AIが計画を再構築' : '✨ AI学習計画を新規生成する';

    let tAll = 0, tDone = 0;
    state.exams.forEach(e => e.materials.forEach(m => {
        if (m.type === 'list') { 
            tAll += m.items.length * m.rounds; 
            tDone += m.items.reduce((s,i)=>s+i.d, 0); 
        } else { 
            let units = (m.type==='range'?(m.end-m.start+1):m.total);
            tAll += units * m.rounds; 
            tDone += (m.doneRounds || []).reduce((a,b)=>a+b, 0);
        }
    }));
    document.getElementById('stat-progress').innerText = Math.floor((tDone/(tAll||1))*100) + '%';
    
    if (state.exams.length) {
        const dates = state.exams.map(e => new Date(e.date));
        const diff = Math.ceil((Math.min(...dates) - new Date().setHours(0,0,0,0)) / 86400000);
        document.getElementById('stat-days').innerText = Math.max(0, diff) + '日';
    }

    const tasks = state.plan[today] || [];
    document.getElementById('today-list').innerHTML = tasks.length ? tasks.map(t => `<div class="item-row"><div><small>${t.sub}</small><br><b>${t.mat}: ${t.desc}</b></div><span class="status-tag">${t.info}</span></div>`).join('') : '<p style="text-align:center; opacity:0.5;">予定なし</p>';

    // ▼▼▼ 変更点1: 登録済み教材に試験日・間隔反復ステータスを表示 ▼▼▼
    document.getElementById('registered-list').innerHTML = state.exams.map(e => e.materials.map(m => {
        const spacedLabel = m.spaced
            ? '<span style="font-size:0.65rem; background:linear-gradient(135deg,rgba(188,0,255,0.2),rgba(0,242,255,0.2)); border:1px solid rgba(188,0,255,0.5); color:#bc00ff; padding:1px 6px; border-radius:4px; margin-left:6px;">⚡ 間隔反復</span>'
            : '<span style="font-size:0.65rem; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.15); color:#64748b; padding:1px 6px; border-radius:4px; margin-left:6px;">通常学習</span>';
        return `<div class="item-row"><div><small>${e.subject}</small><br><b>${m.name}</b>${spacedLabel}<br><span style="font-size:0.72rem; color:#64748b; margin-top:3px; display:inline-block;">📅 試験日: ${e.date}　|　🔁 ${m.rounds}周</span></div><button class="danger" onclick="deleteMat(${e.id}, ${m.id})">削除</button></div>`;
    }).join('')).join('') || '<p style="opacity:0.5;">登録なし</p>';
    // ▲▲▲ 変更点1 ここまで ▲▲▲

    document.getElementById('progress-input-area').innerHTML = state.exams.map(e => e.materials.map(m => {
        if (m.type === 'list') {
            return `<div class="glass-card"><h3>${m.name}</h3><div class="item-row"><span>一括</span><input type="number" onchange="updateProg(${m.id},-1,this.value)" style="width:80px;"><span>周</span></div>${m.items.map((it, idx) => `<div class="item-row"><span>${it.l}</span><input type="number" value="${it.d}" onchange="updateProg(${m.id},${idx},this.value)" style="width:60px;"></div>`).join('')}</div>`;
        } else {
            let drs = m.doneRounds || new Array(m.rounds).fill(0);
            let infoText = m.type === 'range' ? `全体範囲: ${m.start}〜${m.end}` : `全体量: ${m.total}`;
            return `<div class="glass-card"><h3>${m.name}</h3>
                <div style="font-size: 0.8rem; color: #a0aec0; margin-bottom: 8px;">${infoText} ${m.unit||''}</div>
                ${drs.map((dr, idx) => {
                    let val = dr;
                    if(m.type === 'range' && dr > 0) val = `${m.start}-${m.start + dr - 1}`;
                    return `<div class="item-row"><span>${idx+1}周目</span><input type="${m.type==='range'?'text':'number'}" value="${val}" onchange="updateProg(${m.id},${idx+1},this.value)" style="width:100px;"><span>${m.type==='range'?'':(m.unit||'')}</span></div>`
                }).join('')}</div>`;
        }
    }).join('')).join('') || '<p style="opacity:0.5;">登録なし</p>';

    let planHtml = '';
    Object.keys(state.plan).sort().forEach(d => {
        planHtml += `<h4 style="color:var(--accent); border-bottom:1px solid #333; margin-bottom:10px; margin-top:20px;">${d}</h4>`;
        state.plan[d].forEach((t, idx) => {
            const content = isPlanEditing ? `<input type="text" class="plan-edit-input" value="${t.desc}" oninput="updatePlanManual('${d}', ${idx}, this.value)">` : `<b>${t.mat}: ${t.desc}</b>`;
            planHtml += `<div class="item-row"><div style="flex: 1;"><small>${t.sub}</small><br>${content}</div><span class="status-tag">${t.info}</span></div>`;
        });
    });
    document.getElementById('full-plan-area').innerHTML = planHtml || '<p style="opacity:0.5;">計画がありません</p>';
}

window.onload = () => {
    load();
    document.getElementById('sys-start-date').value = toYMD(new Date());
    toggleMode();
    render();
    if (!localStorage.getItem('rtw_tut_done')) {
        setTimeout(showTutorial, 400);
    }
    if ('serviceWorker' in navigator) {
        const sw = "self.addEventListener('install',e=>e.waitUntil(self.skipWaiting()));self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>{});";
        navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw], {type: 'application/javascript'}))).catch(()=>{});
    }
};

window.addEventListener('beforeunload', save);
window.addEventListener('visibilitychange', () => { if (document.visibilityState === 'hidden') save(); });
